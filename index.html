const FeedbackFormModal = ({job,customers,settings,onSubmit,onClose}) => {
  const customer=customers.find(c=>c.id===job.customerId);
  const questions=settings?.feedbackQuestions||DEFAULT_FEEDBACK_QUESTIONS;
  const [answers,setAnswers]=useState(questions.map(()=>null));
  const [signature,setSignature]=useState("");
  const [submitted,setSubmitted]=useState(false);

  const setAnswer=(i,val)=>setAnswers(a=>a.map((v,idx)=>idx===i?val:v));

  const StarRating=({value,onChange})=>(
    <div style={{display:"flex",gap:4,marginTop:8}}>
      {[1,2,3,4,5].map(n=>(
        <button key={n} onClick={()=>onChange(n)} style={{background:"none",border:"none",cursor:"pointer",fontSize:32,color:n<=(value||0)?"#F59E0B":"#D1D5DB",padding:"0 2px",lineHeight:1}}>★</button>
      ))}
    </div>
  );

  const allAnswered=answers.every((a,i)=>questions[i].type==="text"?true:a!==null);

  const handleSubmit=()=>{
    if(!signature.trim()){alert("Please enter your name to sign the form.");return;}
    const result={
      completedAt:new Date().toLocaleString("en-GB"),
      customerName:customer?.name||"",
      signature,
      responses:questions.map((q,i)=>({question:q.question,type:q.type,answer:answers[i]})),
    };
    onSubmit(result);
    setSubmitted(true);
  };

  if(submitted) return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.white,borderRadius:16,padding:40,textAlign:"center",maxWidth:380,width:"100%"}}>
        <div style={{fontSize:56,marginBottom:16}}>🎉</div>
        <h2 style={{margin:"0 0 10px",color:C.navy,fontSize:22,fontWeight:800}}>Thank You!</h2>
        <p style={{color:C.slate,fontSize:15,margin:"0 0 24px"}}>Your feedback has been submitted and saved to the job record.</p>
        <Btn onClick={onClose} style={{width:"100%",justifyContent:"center"}}>Close</Btn>
      </div>
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:C.white,borderRadius:16,width:"100%",maxWidth:420,boxShadow:"0 24px 64px rgba(0,0,0,0.25)",overflow:"hidden"}}>
        {/* Header */}
        <div style={{background:C.navy,padding:"20px 24px",color:"#fff",textAlign:"center"}}>
          <div style={{fontSize:24,marginBottom:6}}>⭐</div>
          <h2 style={{margin:0,fontSize:20,fontWeight:800}}>Customer Feedback Form</h2>
          <p style={{margin:"6px 0 0",opacity:.7,fontSize:13}}>{settings?.companyName||"VisualPro"}</p>
        </div>
        {/* Questions */}
        <div style={{padding:20,maxHeight:"60vh",overflowY:"auto"}}>
          {questions.map((q,i)=>(
            <div key={i} style={{paddingBottom:16,marginBottom:16,borderBottom:`1px solid ${C.border}`}}>
              <p style={{margin:"0 0 10px",fontSize:14,color:C.text,fontWeight:500,lineHeight:1.5}}>{q.question}</p>
              {q.type==="yesno"&&(
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {["Yes","No"].map(opt=>(
                    <label key={opt} onClick={()=>setAnswer(i,opt)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"8px 12px",borderRadius:8,background:answers[i]===opt?C.skyLight:C.slateLight,border:`2px solid ${answers[i]===opt?C.sky:C.border}`,transition:"all 0.1s"}}>

                      </div>
                      <span style={{fontSize:15,fontWeight:answers[i]===opt?700:400,color:answers[i]===opt?C.navy:C.text}}>{opt}</span>
                    </label>
                  ))}

              {q.type==="text"&&(
                <textarea value={answers[i]||""} onChange={e=>setAnswer(i,e.target.value||null)}

              )}

          {/* Signature */}

            <label style={{fontSize:13,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:8}}>Sign & Submit</label>
            <p style={{fontSize:12,color:C.muted,margin:"0 0 10px"}}>By typing your name below you confirm the work has been completed to your satisfaction.</p>
            <input value={signature} onChange={e=>setSignature(e.target.value)} placeholder="Type your full name to sign"

          </div>
        </div>
        {/* Submit */}
        <div style={{padding:"16px 20px",borderTop:`1px solid ${C.border}`,background:C.slateLight}}>
          <button onClick={handleSubmit} disabled={!signature.trim()}
            style={{width:"100%",background:signature.trim()?C.sky:"#CBD5E1",color:"#fff",border:"none",borderRadius:10,padding:"14px",fontSize:16,fontWeight:700,cursor:signature.trim()?"pointer":"not-allowed",transition:"background 0.2s"}}>
            Sign & Submit ✓
          </button>
        </div>
      </div>
    </div>
  );

// ── FitterRow (own component so useState is at top level) ─────────────────────
const FitterRow = ({fitter,index,pw,settings,setSettings}) => {
  const [showPw,setShowPw]=useState(false);
  return (
    <div style={{background:C.slateLight,borderRadius:10,padding:14,marginBottom:12}}>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:C.navy,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,flexShrink:0}}>
          {fitter?fitter.charAt(0).toUpperCase():"?"}
        </div>
        <input value={fitter} onChange={e=>{
          const newName=e.target.value; const oldName=fitter;
          setSettings(s=>{
            const newFitters=s.fitters.map((x,xi)=>xi===index?newName:x);
            const newPws={...s.fitterPasswords};
            if(oldName&&newPws[oldName]!==undefined){newPws[newName]=newPws[oldName];delete newPws[oldName];}
            return {...s,fitters:newFitters,fitterPasswords:newPws};
          });
        }} placeholder="Fitter name" style={{flex:1,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",fontSize:14,outline:"none",background:C.white}}/>
        <button onClick={()=>setSettings(s=>{
          const newFitters=s.fitters.filter((_,xi)=>xi!==index);
          const newPws={...s.fitterPasswords}; delete newPws[fitter];
          return {...s,fitters:newFitters,fitterPasswords:newPws};
        })} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px",cursor:"pointer",color:C.red,fontSize:13,flexShrink:0}}>Remove</button>
      </div>
      <div>
        <label style={{fontSize:11,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6}}>🔒 Portal Password</label>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{flex:1,position:"relative"}}>
            <input type={showPw?"text":"password"} value={pw}
              onChange={e=>setSettings(s=>({...s,fitterPasswords:{...s.fitterPasswords,[fitter]:e.target.value}}))}
              placeholder="Set a password for this fitter"
              style={{width:"100%",border:`1px solid ${pw?C.mint:C.border}`,borderRadius:6,padding:"8px 36px 8px 12px",fontSize:14,outline:"none",background:C.white,boxSizing:"border-box"}}/>
            <button onClick={()=>setShowPw(p=>!p)} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:14,padding:0}}>{showPw?"🙈":"👁️"}</button>
          </div>
          {pw?<div style={{background:"#F0FDF4",color:C.mint,fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:8,border:"1px solid #86EFAC",whiteSpace:"nowrap"}}>✓ Set</div>
             :<div style={{color:C.amber,fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>⚠ No password</div>}
        </div>
        {!pw&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>Without a password this fitter can log in without authentication.</div>}
      </div>
    </div>
  );
};

// ── Dashboard ─────────────────────────────────────────────────────────────────
const Dashboard = ({customers,jobs}) => {
  const today=new Date().toISOString().slice(0,10);

  const stats=useMemo(()=>({
    total:customers.length,
    leads:customers.filter(c=>["New Enquiry","Contacted"].includes(c.stage)).length,
    won:customers.filter(c=>c.stage==="Deal Won").length,
    activeJobs:jobs.filter(j=>j.status!=="Send Guarantees").length,
    pipeline:customers.reduce((s,c)=>s+(Number(c.quoteValue)||0),0),
  }),[customers,jobs]);

  const recent=[...customers].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);

  // Gather all tasks due today or overdue from both customers and jobs
  const allTasks=useMemo(()=>{
    const tasks=[];
    [...customers,...jobs].forEach(record=>{
      const isJob=!!record.title;
      (record.tabs?.tasks||[]).filter(t=>!t.done&&t.dueDate&&t.dueDate<=today).forEach(t=>{
        tasks.push({
          ...t,
          recordName:isJob?record.title:record.name,
          recordType:isJob?"Job":"Customer",
          isOverdue:t.dueDate<today,
          isDueToday:t.dueDate===today,
          alertType:"task",
        });
      });
    });
    return tasks.sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  },[customers,jobs,today]);

  // Gather delivery alerts — due today or overdue and not yet delivered
  const deliveryAlerts=useMemo(()=>{
    const alerts=[];
    jobs.forEach(job=>{
      (job.tabs?.installation?.deliveries||[]).forEach(dv=>{
        if(!dv.deliveryDate||dv.status==="Delivered") return;
        if(dv.deliveryDate<=today){
          alerts.push({
            id:dv.id,
            description:dv.description||"Delivery",
            supplier:dv.supplier||"Unknown supplier",
            jobTitle:job.title,
            deliveryDate:dv.deliveryDate,
            status:dv.status,
            isOverdue:dv.deliveryDate<today,
            isDueToday:dv.deliveryDate===today,
            alertType:"delivery",
          });
        }
      });
    });
    return alerts.sort((a,b)=>a.deliveryDate.localeCompare(b.deliveryDate));
  },[jobs,today]);

  const overdueTaskCount=allTasks.filter(t=>t.isOverdue).length;
  const todayTaskCount=allTasks.filter(t=>t.isDueToday).length;
  const overdueDeliveryCount=deliveryAlerts.filter(d=>d.isOverdue).length;
  const todayDeliveryCount=deliveryAlerts.filter(d=>d.isDueToday).length;
  const totalOverdue=overdueTaskCount+overdueDeliveryCount;
  const hasAlerts=allTasks.length>0||deliveryAlerts.length>0;

  return (
    <div>
      <h2 style={{margin:"0 0 20px",color:C.navy,fontWeight:800,fontSize:22}}>Dashboard</h2>

      {/* Combined alerts banner */}
      {hasAlerts&&(
        <div style={{background:totalOverdue>0?"#FEF2F2":"#FFFBEB",border:`1px solid ${totalOverdue>0?C.red:C.amber}`,borderRadius:10,padding:16,marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:20}}>{totalOverdue>0?"🚨":"📌"}</span>
            <div>
              <div style={{fontWeight:800,fontSize:15,color:totalOverdue>0?C.red:"#92400E"}}>
                {[
                  overdueTaskCount>0?`${overdueTaskCount} Overdue Task${overdueTaskCount>1?"s":""}`:null,
                  todayTaskCount>0?`${todayTaskCount} Task${todayTaskCount>1?"s":""} Due Today`:null,
                  overdueDeliveryCount>0?`${overdueDeliveryCount} Overdue Deliver${overdueDeliveryCount>1?"ies":"y"}`:null,
                  todayDeliveryCount>0?`${todayDeliveryCount} Deliver${todayDeliveryCount>1?"ies":"y"} Today`:null,
                ].filter(Boolean).join(" · ")}
              </div>
              <div style={{fontSize:12,color:C.slate,marginTop:1}}>Items requiring your attention today</div>
            </div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {/* Task alerts */}
            {allTasks.map(t=>(
              <div key={`task-${t.id}`} style={{display:"flex",alignItems:"center",gap:10,background:C.white,borderRadius:8,padding:"10px 14px",border:`1px solid ${t.isOverdue?C.red:C.amber}`}}>
                <span style={{fontSize:14}}>{t.isOverdue?"⚠️":"📌"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||"Untitled task"}</div>
                  <div style={{fontSize:12,color:C.slate,marginTop:1}}>
                    <span style={{background:"#FFF7ED",color:"#C2410C",padding:"1px 6px",borderRadius:8,fontSize:11,fontWeight:600,marginRight:6}}>Task</span>
                    <span style={{background:t.recordType==="Job"?C.skyLight:C.slateLight,color:t.recordType==="Job"?C.sky:C.slate,padding:"1px 6px",borderRadius:8,fontSize:11,fontWeight:600,marginRight:6}}>{t.recordType}</span>
                    {t.recordName}
                    {t.assignedTo&&<span style={{marginLeft:8,color:C.muted}}>· {t.assignedTo}</span>}
                  </div>
                </div>
                <div style={{fontSize:12,fontWeight:700,color:t.isOverdue?C.red:"#92400E",flexShrink:0}}>
                  {t.isOverdue?`Overdue (${t.dueDate})`:"Today"}
                </div>
              </div>
            ))}

            {/* Delivery alerts */}
            {deliveryAlerts.map(d=>(
              <div key={`del-${d.id}`} style={{display:"flex",alignItems:"center",gap:10,background:C.white,borderRadius:8,padding:"10px 14px",border:`1px solid ${d.isOverdue?C.red:"#86EFAC"}`}}>
                <span style={{fontSize:14}}>{d.isOverdue?"⚠️":"🚚"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {d.description}
                    {d.status==="Delayed"&&<span style={{marginLeft:8,background:"#FEF2F2",color:C.red,fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:8}}>Delayed</span>}
                  </div>
                  <div style={{fontSize:12,color:C.slate,marginTop:1}}>
                    <span style={{background:"#F0FDF4",color:"#15803D",padding:"1px 6px",borderRadius:8,fontSize:11,fontWeight:600,marginRight:6}}>Delivery</span>
                    {d.supplier&&<span style={{marginRight:6}}>{d.supplier} ·</span>}
                    {d.jobTitle}
                  </div>
                </div>
                <div style={{fontSize:12,fontWeight:700,color:d.isOverdue?C.red:"#15803D",flexShrink:0}}>
                  {d.isOverdue?`Overdue (${d.deliveryDate})`:"Due Today"}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:14,marginBottom:28}}>
        {[["Total Customers",stats.total,C.navy],["Active Leads",stats.leads,C.amber],["Deals Won",stats.won,C.mint],["Active Jobs",stats.activeJobs,C.sky],["Quote Pipeline",`£${stats.pipeline.toLocaleString()}`,C.mint]].map(([label,value,color])=>(

              <div key={stage} style={{flex:1,textAlign:"center"}}>
                <div style={{height:8,background:meta.bg,borderRadius:4,marginBottom:6,border:`1px solid ${meta.text}30`}}>

          warm:{icon:"🌡️",label:"Warm Leads",activeBg:"#FEF3C7",border:"#FDE68A",text:"#92400E"},
          cold:{icon:"🥶",label:"Cold Leads",activeBg:"#DBEAFE",border:"#BFDBFE",text:"#1D4ED8"},

          <div style={{background:C.white,borderRadius:10,padding:20,border:`1px solid ${C.border}`,marginBottom:20}}>
            <h3 style={{margin:"0 0 16px",fontSize:15,color:C.navy,fontWeight:700}}>🌡️ Lead Temperature</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
              {["hot","warm","cold"].map(t=>{
                const meta=tempMeta[t];
                return (
                  <div key={t} style={{background:meta.activeBg,borderRadius:10,padding:"14px 16px",border:`1px solid ${meta.border}`,textAlign:"center"}}>
                    <div style={{fontSize:28,marginBottom:4}}>{meta.icon}</div>
                    <div style={{fontSize:22,fontWeight:800,color:meta.text}}>{tempCounts[t]}</div>
                    <div style={{fontSize:12,fontWeight:700,color:meta.text,marginBottom:4}}>{meta.label}</div>
                    {tempValue[t]>0&&<div style={{fontSize:11,color:meta.text,opacity:0.8}}>£{tempValue[t].toLocaleString()} pipeline</div>}

                );
              })}
            </div>
            {tempCounts.hot>0&&(
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#DC2626",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>🔥 Hot Leads — Action Now</div>
                {customers.filter(c=>c.tabs?.quote?.leadTemp==="hot"&&!["Deal Won","Deal Lost"].includes(c.stage))
                  .sort((a,b)=>(a.tabs?.quote?.expectedSaleDate||"9999").localeCompare(b.tabs?.quote?.expectedSaleDate||"9999"))
                  .map(c=>{
                    const saleDate=c.tabs?.quote?.expectedSaleDate;
                    const daysLeft=saleDate?Math.ceil((new Date(saleDate)-new Date())/(1000*60*60*24)):null;
                    return (
                      <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                        <span style={{fontSize:18,flexShrink:0}}>🔥</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                          <div style={{fontSize:12,color:C.slate,marginTop:1,display:"flex",alignItems:"center",gap:6}}>

                            {c.soldBy&&<span style={{color:C.muted}}>· {c.soldBy}</span>}
                          </div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          {c.quoteValue&&<div style={{fontSize:13,fontWeight:800,color:C.navy}}>£{Number(c.quoteValue).toLocaleString()}</div>}
                          {daysLeft!==null&&<div style={{fontSize:11,fontWeight:600,color:daysLeft<=0?C.red:daysLeft<=7?"#92400E":C.mint,marginTop:2}}>{daysLeft<=0?"Overdue":daysLeft===0?"Today":`${daysLeft}d to close`}</div>}
                        </div>
                      </div>
                    );
                  })}
              </div>
            )}
          </div>
        );
      })()}

      {/* ── Quotes Forecast ── */}
      {(()=>{
        const todayStr=new Date().toISOString().slice(0,10);
        const quotesWithDates=customers
          .filter(c=>c.tabs?.quote?.expectedSaleDate&&!["Deal Won","Deal Lost"].includes(c.stage))
          .sort((a,b)=>a.tabs.quote.expectedSaleDate.localeCompare(b.tabs.quote.expectedSaleDate));
        if(quotesWithDates.length===0) return null;
        const tempStyle={hot:{icon:"🔥",color:"#DC2626"},warm:{icon:"🌡️",color:"#92400E"},cold:{icon:"🥶",color:"#1D4ED8"}};
        return (
          <div style={{background:C.white,borderRadius:10,padding:20,border:`1px solid ${C.border}`,marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h3 style={{margin:0,fontSize:15,color:C.navy,fontWeight:700}}>📅 Quotes Forecast</h3>
              <div style={{fontSize:12,color:C.slate,fontWeight:600}}>£{quotesWithDates.reduce((s,c)=>s+(Number(c.quoteValue)||0),0).toLocaleString()} total</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 100px 70px 90px 80px",gap:8,padding:"6px 0",borderBottom:`2px solid ${C.border}`,marginBottom:4}}>
              {["Customer","Expected Sale","Temp","Value","Sold By"].map(h=>(
                <div key={h} style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</div>
              ))}
            </div>
            {quotesWithDates.map(c=>{
              const saleDate=c.tabs.quote.expectedSaleDate;
              const diff=Math.ceil((new Date(saleDate)-new Date())/(1000*60*60*24));
              const isPast=saleDate<todayStr;
              const isClose=!isPast&&diff<=7;
              const temp=c.tabs?.quote?.leadTemp;
              const ts=temp?tempStyle[temp]:null;
              return (
                <div key={c.id} style={{display:"grid",gridTemplateColumns:"1fr 100px 70px 90px 80px",gap:8,padding:"10px 0 10px 8px",borderBottom:`1px solid ${C.border}`,alignItems:"center",background:isPast?"#FEF2F2":"transparent",borderRadius:6,marginBottom:2}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                    <div style={{marginTop:2}}><Badge label={c.stage}/></div>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:isPast?C.red:isClose?"#92400E":C.text}}>{new Date(saleDate).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</div>
                    <div style={{fontSize:10,fontWeight:600,color:isPast?C.red:isClose?"#92400E":C.muted}}>{isPast?`${Math.abs(diff)}d overdue`:diff===0?"Today":`in ${diff}d`}</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:ts?ts.color:C.muted}}>{ts?`${ts.icon} ${temp.charAt(0).toUpperCase()+temp.slice(1)}`:"—"}</div>
                  <div style={{fontSize:13,fontWeight:800,color:C.navy}}>{c.quoteValue?`£${Number(c.quoteValue).toLocaleString()}`:"—"}</div>
                  <div style={{fontSize:12,color:C.slate,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.soldBy||"—"}</div>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ── Recent Enquiries ── */}
      <div style={{background:C.white,borderRadius:10,padding:20,border:`1px solid ${C.border}`}}>
        <h3 style={{margin:"0 0 14px",fontSize:15,color:C.navy,fontWeight:700}}>Recent Enquiries</h3>
        {recent.map(c=>(
          <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:C.text}}>{c.name}</div>
              <div style={{fontSize:12,color:C.slate}}>{c.address}</div>
            </div>
            <Badge label={c.stage}/>
          </div>
        ))}
      </div>
    </div>
  );
};

  const [view,setView]=useState("calendar"); // calendar | job
  const [selectedJob,setSelectedJob]=useState(null);
  const [activeTab,setActiveTab]=useState("details");
  const [showFeedback,setShowFeedback]=useState(false);
  const [viewDate,setViewDate]=useState(new Date());
  const today=new Date().toISOString().slice(0,10);

  // All jobs assigned to this fitter via installation tab
  const myEvents=useMemo(()=>{
    const evts=[];
    jobs.forEach(j=>{
      const inst=j.tabs?.installation;
      const survey=j.tabs?.survey;
      if(inst?.date&&(inst.fitters||[]).includes(fitterName)){
        // Expand across working days
        const duration=Number(inst.duration||2);
        let current=new Date(inst.date);
        let remaining=duration;
        let dayIndex=1;
        while(remaining>0){
          const dow=current.getDay();
          if(dow!==0&&dow!==6){
            evts.push({type:"Install",date:current.toISOString().slice(0,10),time:dayIndex===1?(inst.startTime||""):"",job:j,dayIndex,totalDays:Math.ceil(duration/2)});
            remaining-=remaining>=2?2:remaining;
            dayIndex++;
          }
          current=new Date(current);current.setDate(current.getDate()+1);
        }
      }
      if(survey?.date&&survey?.fitter===fitterName){
        evts.push({type:"Survey",date:survey.date,time:survey.time||"",job:j});
      }
      // Service call bookings
      (j.tabs?.serviceCall?.bookings||[]).forEach(b=>{
        if(b.date&&b.fitter===fitterName){
          evts.push({type:"Service Call",date:b.date,time:b.startTime||"",endTime:b.endTime||"",job:j,notes:b.notes||""});
        }
      });
    });
    return evts.sort((a,b)=>a.date.localeCompare(b.date));
  },[jobs,fitterName]);

  const updateJob=(updated)=>setJobs(js=>js.map(j=>j.id===updated.id?updated:j));

  const addSurveyImage=async(e,job)=>{
    const files=Array.from(e.target.files);
    const datas=await Promise.all(files.map(readFileAsDataURL));
    const updated={...job,tabs:{...job.tabs,survey:{...job.tabs.survey,images:[...(job.tabs.survey.images||[]),...datas]}}};
    updateJob(updated);
    setSelectedJob(updated);
    e.target.value="";
  };

              {job.tabs?.survey?.notes&&(
                <div style={{background:C.white,borderRadius:12,padding:16,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Survey Notes</div>
                  <div style={{fontSize:14,color:C.text,lineHeight:1.6}}>{job.tabs.survey.notes}</div>

          )}

          {/* ── SERVICE CALL ── */}
          {activeTab==="servicecall"&&(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {/* Office notes */}
              {job.tabs?.serviceCall?.notes&&(
                <div style={{background:"#FAF5FF",borderRadius:12,padding:16,border:`2px solid #C4B5FD`}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#6D28D9",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🔧 Service Call Notes from Office</div>
                  <div style={{fontSize:14,color:"#4C1D95",lineHeight:1.7,whiteSpace:"pre-line"}}>{job.tabs.serviceCall.notes}</div>
                </div>
              )}
              {!job.tabs?.serviceCall?.notes&&(
                <div style={{background:C.white,borderRadius:12,padding:24,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`}}>No service call notes from office yet.</div>
              )}

              {(job.tabs?.serviceCall?.officePhotos||[]).length>0&&(
                <div style={{background:C.white,borderRadius:12,padding:16,border:`1px solid ${C.border}`}}>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>

              {/* Fitter photos — fitter can add their own */}
              <div style={{background:"#F0FDF4",borderRadius:12,padding:16,border:"1px solid #86EFAC"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#15803D",textTransform:"uppercase",letterSpacing:"0.08em"}}>📷 Fitter Photos</div>
                  <label style={{background:C.mint,color:"#fff",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6}}>
                    📷 Fitter Photos
                    <input type="file" accept="image/*" multiple capture="environment" onChange={async(e)=>{
                      const files=Array.from(e.target.files);
                      const datas=await Promise.all(files.map(readFileAsDataURL));
                      const updated={...job,tabs:{...job.tabs,serviceCall:{...job.tabs.serviceCall,fitterPhotos:[...(job.tabs.serviceCall?.fitterPhotos||[]),...datas]}}};
                      updateJob(updated);setSelectedJob(updated);
                      e.target.value="";

                </div>
                {(job.tabs?.serviceCall?.fitterPhotos||[]).length===0&&(

                )}
                {(job.tabs?.serviceCall?.fitterPhotos||[]).length>0&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>

                )}

              {(job.tabs?.serviceCall?.bookings||[]).filter(b=>b.fitter===fitterName).length>0&&(

                  <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>📅 Your Service Call Bookings</div>
                  {(job.tabs.serviceCall.bookings||[]).filter(b=>b.fitter===fitterName).map((b,i)=>(
                    <div key={i} style={{background:"#FAF5FF",borderRadius:8,padding:12,marginBottom:8,border:"1px solid #C4B5FD"}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#6D28D9"}}>
                        📅 {b.date?new Date(b.date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"}):"TBC"}
                      </div>
                      {b.startTime&&<div style={{fontSize:13,color:"#7C3AED",marginTop:2}}>🕐 {b.startTime}{b.endTime?` – ${b.endTime}`:""}</div>}
                      {b.notes&&<div style={{fontSize:13,color:"#4C1D95",marginTop:4,lineHeight:1.5}}>{b.notes}</div>}

        {/* Feedback modal */}
        {showFeedback&&(

            onClose={()=>setShowFeedback(false)}/>
