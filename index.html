// ── Helpers ───────────────────────────────────────────────────────────────────
const calcMargin = (value,cost) => {
  const v=Number(value),c=Number(cost);
  if(!v||!c||v===0) return null;
  return {profit:v-c,pct:((v-c)/v*100).toFixed(1)};
};

const readFileAsDataURL = (file) => new Promise(res => {
  const r=new FileReader(); r.onload=e=>res({name:file.name,type:file.type,data:e.target.result}); r.readAsDataURL(file);
});

// ── Primitives ────────────────────────────────────────────────────────────────
const Badge = ({label}) => {
  const c=STATUS_COLORS[label]||{bg:C.slateLight,text:C.slate};
  return <span style={{background:c.bg,color:c.text,padding:"2px 10px",borderRadius:20,fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{label}</span>;
};

const Inp = ({label,...p}) => (
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</label>}
    <input {...p} style={{border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",fontSize:14,color:C.text,outline:"none",background:C.white,...p.style}}/>
  </div>
);

const Sel = ({label,children,...p}) => (
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</label>}
    <select {...p} style={{border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",fontSize:14,color:C.text,outline:"none",background:C.white,...p.style}}>{children}</select>
  </div>
);

const TA = ({label,...p}) => (
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</label>}
    <textarea {...p} style={{border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",fontSize:14,color:C.text,outline:"none",background:C.white,resize:"vertical",minHeight:80,...p.style}}/>
  </div>
);

const Btn = ({variant="primary",children,...p}) => {
  const s={primary:{background:C.sky,color:"#fff",border:"none"},secondary:{background:C.white,color:C.navy,border:`1px solid ${C.border}`},danger:{background:C.red,color:"#fff",border:"none"},ghost:{background:"transparent",color:C.sky,border:"none"}};
  return <button {...p} style={{...s[variant],padding:"8px 16px",borderRadius:6,fontSize:14,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6,...p.style}}>{children}</button>;
};

const Modal = ({title,onClose,children,wide}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:C.white,borderRadius:12,width:"100%",maxWidth:wide?780:560,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 24px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:C.white,zIndex:1}}>
        <h2 style={{margin:0,fontSize:18,color:C.navy,fontWeight:700}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.slate,lineHeight:1}}>×</button>
      </div>
      <div style={{padding:24}}>{children}</div>

// ── File Attachment Widget ────────────────────────────────────────────────────
const FileAttach = ({files,onAdd,onRemove,accept,label="Attach File"}) => {
  const handleChange = async (e) => {
    const f=e.target.files[0]; if(!f) return;
    const data=await readFileAsDataURL(f);
    onAdd(data);
    e.target.value="";
  };
  return (
    <div>
      <label style={{display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",background:C.slateLight,border:`1px dashed ${C.border}`,borderRadius:6,padding:"7px 14px",fontSize:13,color:C.slate,fontWeight:600}}>
        📎 {label}
        <input type="file" accept={accept} onChange={handleChange} style={{display:"none"}}/>
      </label>
      {files.length>0&&(
        <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:6}}>
          {files.map((f,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:C.slateLight,borderRadius:6,padding:"6px 10px"}}>
              <span style={{fontSize:16}}>{f.type==="application/pdf"?"📄":f.type?.startsWith("image")?"🖼️":"📎"}</span>
              <a href={f.data} download={f.name} style={{fontSize:13,color:C.sky,fontWeight:500,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</a>
              <button onClick={()=>onRemove(i)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ── Image Gallery Widget ──────────────────────────────────────────────────────
const ImageGallery = ({images,onAdd,onRemove}) => {
  const handleChange = async (e) => {
    const files=Array.from(e.target.files);
    const datas=await Promise.all(files.map(readFileAsDataURL));
    datas.forEach(onAdd);
    e.target.value="";
  };
  return (
    <div>
      <label style={{display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",background:C.slateLight,border:`1px dashed ${C.border}`,borderRadius:6,padding:"7px 14px",fontSize:13,color:C.slate,fontWeight:600}}>
        📷 Add Photos
        <input type="file" accept="image/*" multiple onChange={handleChange} style={{display:"none"}}/>
      </label>
      {images.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8,marginTop:10}}>
          {images.map((img,i)=>(
            <div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",aspectRatio:"1",border:`1px solid ${C.border}`}}>
              <img src={img.data} alt={img.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              <button onClick={()=>onRemove(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.5)",border:"none",color:"#fff",borderRadius:"50%",width:20,height:20,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ── Card Detail Modal with Tabs ───────────────────────────────────────────────
const CardDetailModal = ({record,customers,onSave,onDelete,onClose,isJob,settings}) => {
  const [activeTab,setActiveTab]=useState("Details");
  const [data,setData]=useState({...record,_settings:settings});
  const [showFeedbackForm,setShowFeedbackForm]=useState(false);
  const customer=isJob?customers.find(c=>c.id===data.customerId):null;

  const setTab=(key,val)=>setData(d=>({...d,tabs:{...d.tabs,[key]:{...d.tabs[key],...val}}}));

  const addFile=(tabKey,file)=>setData(d=>({...d,tabs:{...d.tabs,[tabKey]:{...d.tabs[tabKey],files:[...d.tabs[tabKey].files,file]}}}));
  const removeFile=(tabKey,i)=>setData(d=>({...d,tabs:{...d.tabs,[tabKey]:{...d.tabs[tabKey],files:d.tabs[tabKey].files.filter((_,idx)=>idx!==i)}}}));
  const addImage=(file)=>setData(d=>({...d,tabs:{...d.tabs,survey:{...d.tabs.survey,images:[...d.tabs.survey.images,file]}}}));
  const removeImage=(i)=>setData(d=>({...d,tabs:{...d.tabs,survey:{...d.tabs.survey,images:d.tabs.survey.images.filter((_,idx)=>idx!==i)}}}));

  const margin=calcMargin(data.quoteValue,data.quoteCost);
  const tabStyle=(t)=>({
    padding:"8px 14px",border:"none",cursor:"pointer",fontSize:13,fontWeight:activeTab===t?700:500,
    borderBottom:`2px solid ${activeTab===t?C.sky:"transparent"}`,
    color:activeTab===t?C.sky:C.slate,background:"transparent",whiteSpace:"nowrap",
  });

  return (
    <Modal title={isJob?data.title:data.name} onClose={()=>{onSave(data);onClose();}} wide>
      {/* Tab bar */}
      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:20,overflowX:"auto"}}>
        {CARD_TABS.map(t=><button key={t} style={tabStyle(t)} onClick={()=>setActiveTab(t)}>{t}</button>)}
      </div>

      {/* ── DETAILS TAB ── */}
      {activeTab==="Details"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {isJob?(
            <>
              <Inp label="Job Title" value={data.title} onChange={e=>setData(d=>({...d,title:e.target.value}))}/>
              <Sel label="Customer" value={data.customerId} onChange={e=>setData(d=>({...d,customerId:Number(e.target.value)}))}>
                {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </Sel>
              {/* Full customer info panel */}
              <div style={{background:C.slateLight,borderRadius:8,padding:12}}>
                <div style={{fontSize:12,fontWeight:600,color:C.slate,marginBottom:8}}>CUSTOMER INFO</div>
                {customer&&[["📧",customer.email],["📞",customer.phone],["🔗 Source",customer.source],["💰 Quote",customer.quoteValue?`£${Number(customer.quoteValue).toLocaleString()}`:"—"],["📊 Margin",customer.quoteValue&&customer.quoteCost?(()=>{const m=calcMargin(customer.quoteValue,customer.quoteCost);return m?`${m.pct}% (£${m.profit.toLocaleString()})`:"—"})():"—"]].map(([icon,val])=>(
                  <div key={icon} style={{fontSize:13,color:C.text,padding:"5px 0",borderBottom:`1px solid ${C.border}`,display:"flex",gap:8}}>
                    <span style={{color:C.slate,minWidth:90,flexShrink:0}}>{icon}</span>
                    <span style={{fontWeight:500}}>{val||"—"}</span>
                  </div>
                ))}
                {/* Address with map link */}
                {customer?.address&&(
                  <div style={{padding:"5px 0",borderBottom:`1px solid ${C.border}`,display:"flex",gap:8,alignItems:"flex-start"}}>
                    <span style={{color:C.slate,minWidth:90,flexShrink:0,fontSize:13}}>📍 Address</span>
                    <div style={{flex:1}}>
                      <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(customer.address)}`} target="_blank" rel="noreferrer"
                        style={{fontSize:13,fontWeight:600,color:C.sky,textDecoration:"none",display:"block",marginBottom:6}}>
                        {customer.address} ↗
                      </a>
                    </div>
                  </div>
                )}
              </div>
              {/* Google Maps embed */}
              {customer?.address&&(
                <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`,position:"relative"}}>
                  <div style={{background:C.navy,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                  dates.push({
                    date:current.toISOString().slice(0,10),
                    label:current.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}),
                    session:remaining>=2?"Full day":remaining===1?"AM":"",
                    halfDay:remaining<2,
                  });
                  remaining-=remaining>=2?2:1;
                }
                current=new Date(current);
                current.setDate(current.getDate()+1);
              }
              return dates;
            };

            const duration=data.tabs.installation.duration||"2"; // in half days
            const scheduledDays=data.tabs.installation.date?addWorkingDays(data.tabs.installation.date,Number(duration)):[];
            const endDate=scheduledDays.length>0?scheduledDays[scheduledDays.length-1].date:"";

            const DURATION_OPTIONS=[
              {value:"1",label:"Half Day (AM)"},
              {value:"2",label:"1 Day"},
              {value:"3",label:"1.5 Days"},
              {value:"4",label:"2 Days"},
              {value:"6",label:"3 Days"},
              {value:"8",label:"4 Days"},
              {value:"10",label:"5 Days"},
              {value:"12",label:"6 Days"},
              {value:"14",label:"7 Days (2 weeks)"},
            ];

            return (
              <div style={{background:C.slateLight,borderRadius:8,padding:14}}>
                <div style={{fontSize:12,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:12}}>📅 Book Installation</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
                  <Inp label="Start Date" type="date" value={data.tabs.installation.date||""} onChange={e=>setTab("installation",{date:e.target.value})}/>
                  <Inp label="Start Time" type="time" value={data.tabs.installation.startTime||""} onChange={e=>setTab("installation",{startTime:e.target.value})}/>
                  <Sel label="Duration" value={duration} onChange={e=>setTab("installation",{duration:e.target.value})}>
                    {DURATION_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                  </Sel>
                </div>

                {/* Scheduled days breakdown */}
                {scheduledDays.length>0&&(
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:11,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6}}>Scheduled Days (Weekends Auto-Skipped)</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {scheduledDays.map((day,i)=>(
                        <div key={i} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:12,color:C.navy,fontWeight:600}}>
                          {day.label}{day.halfDay?<span style={{color:C.slate,fontWeight:400}}> (AM)</span>:""}
                        </div>
                      ))}
                    </div>
                    {endDate&&endDate!==data.tabs.installation.date&&(
                      <div style={{fontSize:12,color:C.slate,marginTop:6}}>
                        📅 Finishes: <strong>{new Date(endDate).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</strong>
                      </div>
                    )}
                  </div>
                )}

                {/* Fitter multi-select */}
                <div>
                  <label style={{fontSize:12,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:8}}>Assign Fitters</label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {(settings?.fitters||DEFAULT_FITTERS).map(f=>{
                      const selected=(data.tabs.installation.fitters||[]).includes(f);
                      return (
                        <button key={f} onClick={()=>{
                          const current=data.tabs.installation.fitters||[];
                          setTab("installation",{fitters:selected?current.filter(x=>x!==f):[...current,f]});
                        }} style={{padding:"6px 14px",borderRadius:20,fontSize:13,cursor:"pointer",fontWeight:600,
                          background:selected?C.navy:C.white,color:selected?"#fff":C.slate,
                          border:`1px solid ${selected?C.navy:C.border}`,transition:"all 0.15s"}}>
                          👷 {f}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Confirmation banner */}
          {data.tabs.installation.date&&(data.tabs.installation.fitters||[]).length>0&&(()=>{
            const dur=data.tabs.installation.duration||"2";
            const DURATION_OPTIONS=[{value:"1",label:"Half Day"},{value:"2",label:"1 Day"},{value:"3",label:"1.5 Days"},{value:"4",label:"2 Days"},{value:"6",label:"3 Days"},{value:"8",label:"4 Days"},{value:"10",label:"5 Days"},{value:"12",label:"6 Days"},{value:"14",label:"7 Days"}];
            const durLabel=DURATION_OPTIONS.find(o=>o.value===dur)?.label||"";

            // Recalculate end date for banner
            let endDate="";
            let current=new Date(data.tabs.installation.date);
            let remaining=Number(dur);
            let last=null;
            while(remaining>0){
              const dow=current.getDay();
              if(dow!==0&&dow!==6){last=current.toISOString().slice(0,10);remaining-=remaining>=2?2:remaining;}
              current=new Date(current);current.setDate(current.getDate()+1);
            }
            endDate=last||data.tabs.installation.date;
            const sameDay=endDate===data.tabs.installation.date;

            return (
              <div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:8,padding:14}}>
                <div style={{fontSize:14,fontWeight:700,color:"#15803D",marginBottom:6}}>✅ Installation Booked — {durLabel}</div>
                <div style={{fontSize:13,color:"#166534",marginBottom:3}}>
                  🗓️ <strong>Start:</strong> {new Date(data.tabs.installation.date).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
                  {data.tabs.installation.startTime&&` at ${data.tabs.installation.startTime}`}
                </div>
                {!sameDay&&(
                  <div style={{fontSize:13,color:"#166534",marginBottom:3}}>
                    🏁 <strong>End:</strong> {new Date(endDate).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
                  </div>
                )}
                <div style={{fontSize:13,color:"#166534",marginBottom:3}}>👷 {(data.tabs.installation.fitters||[]).join(", ")}</div>
                <div style={{fontSize:12,color:"#15803D",opacity:0.8}}>Weekends automatically skipped · Visible on Fitter Calendar</div>
              </div>
            );
          })()}

          {/* ── Deliveries for this job ── */}
          {(()=>{
            const deliveries=data.tabs.installation.deliveries||[];
            const suppliers=settings?.suppliers||DEFAULT_SUPPLIERS;

            const addDelivery=()=>setData(d=>({...d,tabs:{...d.tabs,installation:{...d.tabs.installation,deliveries:[...deliveries,{id:uid(),supplier:"",deliveryDate:"",description:"",status:"Ordered",notes:""}]}}}));
            const updateDelivery=(did,field,val)=>setData(d=>({...d,tabs:{...d.tabs,installation:{...d.tabs.installation,deliveries:(d.tabs.installation.deliveries||[]).map(dv=>dv.id===did?{...dv,[field]:val}:dv)}}}));
            const removeDelivery=(did)=>setData(d=>({...d,tabs:{...d.tabs,installation:{...d.tabs.installation,deliveries:(d.tabs.installation.deliveries||[]).filter(dv=>dv.id!==did)}}}));

            const DSTATUS=["Ordered","Delivered","Delayed"];
            const DSTYLE={"Ordered":{bg:"#EEF2FF",text:"#4338CA"},"Delivered":{bg:"#F0FDF4",text:"#15803D"},"Delayed":{bg:"#FEF2F2",text:"#DC2626"}};

            return (
              <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{background:"#7C3AED",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:16}}>🚚</span>
                    <div>
                      <div style={{color:"#fff",fontWeight:700,fontSize:14}}>Deliveries</div>
                      <div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{deliveries.length} deliver{deliveries.length===1?"y":"ies"} for this job</div>
                    </div>
                  </div>
                  <button onClick={addDelivery} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                    + Add Delivery
                  </button>
                </div>

                {deliveries.length===0&&(
                  <div style={{padding:"20px 16px",textAlign:"center",color:C.muted,fontSize:13,background:C.slateLight}}>
                    No deliveries added yet. Click <strong>+ Add Delivery</strong> to track a supplier delivery for this job.
                  </div>
                )}

                {deliveries.map((dv,i)=>{
                  const st=DSTYLE[dv.status]||DSTYLE["Ordered"];
                  return (
                    <div key={dv.id} style={{padding:14,borderBottom:`1px solid ${C.border}`,background:C.white}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.navy}}>Delivery {i+1}</div>
                        <button onClick={()=>removeDelivery(dv.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {/* Supplier dropdown */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                          <div>
                            <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Supplier</label>
                            <select value={dv.supplier} onChange={e=>updateDelivery(dv.id,"supplier",e.target.value)}
                              style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,color:C.text}}>
                              <option value="">— Select Supplier —</option>
                              {suppliers.filter(s=>s).map(s=><option key={s}>{s}</option>)}
                            </select>
                          </div>
                          <div>
                            <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Expected Delivery</label>
                            <input type="date" value={dv.deliveryDate} onChange={e=>updateDelivery(dv.id,"deliveryDate",e.target.value)}
                              style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                          </div>
                        </div>
                        {/* Description */}
                        <div>
                          <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Products / Description</label>
                          <input value={dv.description} onChange={e=>updateDelivery(dv.id,"description",e.target.value)}
                            placeholder="e.g. Casement frames x4, white" style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                        </div>
                        {/* Status + notes */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                          <div>
                            <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Status</label>
                            <select value={dv.status} onChange={e=>updateDelivery(dv.id,"status",e.target.value)}
                              style={{width:"100%",border:`1px solid ${st.text}50`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:st.bg,color:st.text,fontWeight:600}}>
                              {DSTATUS.map(s=><option key={s}>{s}</option>)}
                            </select>
                          </div>
                          <div>
                            <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Notes</label>
                            <input value={dv.notes} onChange={e=>updateDelivery(dv.id,"notes",e.target.value)}
                              placeholder="e.g. AM delivery only" style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                          </div>
                        </div>
                        {/* Delivery date confirmation */}
                        {dv.supplier&&dv.deliveryDate&&(
                          <div style={{background:dv.status==="Delivered"?"#F0FDF4":dv.status==="Delayed"?"#FEF2F2":"#EFF6FF",borderRadius:6,padding:"8px 12px",fontSize:12,color:dv.status==="Delivered"?"#15803D":dv.status==="Delayed"?C.red:"#1D4ED8",fontWeight:600}}>
                            {dv.status==="Delivered"?"✅":"📦"} {dv.supplier} — {dv.status==="Delivered"?"Delivered":"Expected"} {new Date(dv.deliveryDate).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}
                          </div>
                        )}

                        {/* Delivery note attachment — shown when Delivered */}
                        {dv.status==="Delivered"&&(
                          <div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:8,padding:12}}>
                            <div style={{fontSize:12,fontWeight:700,color:"#15803D",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                              📄 Delivery Note / Proof of Delivery
                            </div>
                            <FileAttach
                              files={dv.deliveryFiles||[]}
                              onAdd={async(file)=>{
                                const current=dv.deliveryFiles||[];
                                updateDelivery(dv.id,"deliveryFiles",[...current,file]);
                              }}
                              onRemove={(i)=>{
                                const current=[...(dv.deliveryFiles||[])];
                                current.splice(i,1);
                                updateDelivery(dv.id,"deliveryFiles",current);
                              }}
                              accept=".pdf,application/pdf,image/*"
                              label="Attach Delivery Note (PDF)"
                            />
                            {(!dv.deliveryFiles||dv.deliveryFiles.length===0)&&(
                              <div style={{fontSize:11,color:"#15803D",marginTop:6,opacity:0.7}}>Attach the supplier's delivery note as proof of delivery.</div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}

                {deliveries.length>0&&(
                  <div style={{padding:"10px 14px",background:C.slateLight,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
                    {["Ordered","Delivered","Delayed"].map(s=>{
                      const count=deliveries.filter(d=>d.status===s).length;
                      if(!count) return null;
                      const st=DSTYLE[s];
                      const withNotes=s==="Delivered"?deliveries.filter(d=>d.status==="Delivered"&&(d.deliveryFiles||[]).length>0).length:0;
                      return (
                        <span key={s} style={{fontSize:12,fontWeight:600,color:st.text}}>
                          {s}: {count}
                          {withNotes>0&&<span style={{marginLeft:4,fontSize:11,opacity:0.8}}>({withNotes} 📄)</span>}
                        </span>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })()}
          <div style={{border:`2px solid ${C.amber}`,borderRadius:8,padding:14,background:"#FFFBEB"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{fontSize:16}}>📋</span>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#92400E"}}>Fitter's Notes</div>
                <div style={{fontSize:11,color:"#B45309"}}>These notes are visible to fitters on their phones via the calendar.</div>
              </div>
            </div>
            <TA value={data.tabs.installation.fittersNotes||""} onChange={e=>setTab("installation",{fittersNotes:e.target.value})}
              placeholder={"e.g.\n• Gate code: 1234\n• Park on drive, not road\n• Customer wants white frames confirmed on arrival\n• Bring extra packers for bay window"}
              style={{minHeight:130,background:C.white}}/>
          </div>

          {/* ── Email Reminders ── */}
          {(()=>{
            const instDate=data.tabs.installation.date;
            const customerRec=customers.find(c=>c.id===data.customerId);
            const emailReminders=data.tabs.installation.emailReminders||{week:{status:"pending",sentAt:""},day:{status:"pending",sentAt:""}};

            const calcSendDate=(daysBeforeStr,base)=>{
              if(!base) return null;
              const d=new Date(base);
              d.setDate(d.getDate()-daysBeforeStr);
              return d;
            };
            const weekDate=calcSendDate(7,instDate);
            const dayDate=calcSendDate(1,instDate);

            const fillTemplate=(tmpl)=>{
              if(!tmpl||!customerRec) return "";
              return tmpl
                .replace(/{{customerName}}/g,customerRec.name||"")
                .replace(/{{address}}/g,customerRec.address||"")
                .replace(/{{installDate}}/g,instDate?new Date(instDate).toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"}):"")
                .replace(/{{fitterNames}}/g,(data.tabs.installation.fitters||[]).join(", ")||"")
                .replace(/{{companyName}}/g,settings?.companyName||"VisualPro")
                .replace(/{{companyPhone}}/g,settings?.companyPhone||"");
            };

            const handleSendEmail=(reminderKey)=>{
              if(!instDate||!customerRec) return;
              const tmpl=settings?.emailTemplates?.installReminder;
              const body=fillTemplate(tmpl?.body||"");
              const subject=fillTemplate(tmpl?.subject||"Install Reminder");
              const mailto=`mailto:${customerRec.email||""}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
              window.open(mailto,"_blank");
              setTab("installation",{emailReminders:{...emailReminders,[reminderKey]:{status:"sent",sentAt:new Date().toLocaleDateString("en-GB")}}});
            };

            const ReminderRow=({label,icon,sendDate,reminderKey,daysLabel})=>{
              const r=emailReminders[reminderKey]||{status:"pending",sentAt:""};
              const isSent=r.status==="sent";
              const canSend=!!instDate&&!!customerRec?.email;
              return (
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:isSent?"#F0FDF4":C.white,borderRadius:8,border:`1px solid ${isSent?"#86EFAC":C.border}`}}>
                  <span style={{fontSize:20,flexShrink:0}}>{icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.navy}}>{label}</div>
                    <div style={{fontSize:12,color:C.slate,marginTop:2}}>
                      {sendDate?`Send on ${sendDate.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})} (${daysLabel} before install)`:"Set an install date to calculate"}
                    </div>
                    {isSent&&<div style={{fontSize:11,color:"#15803D",marginTop:2,fontWeight:600}}>✓ Sent {r.sentAt}</div>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                    {isSent?(
                      <div style={{display:"flex",gap:6}}>
                        <span style={{background:"#F0FDF4",color:"#15803D",fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:12,border:"1px solid #86EFAC"}}>✓ Sent</span>
                        <button onClick={()=>handleSendEmail(reminderKey)} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",textDecoration:"underline"}}>Resend</button>
                      </div>
                    ):(
                      <button onClick={()=>handleSendEmail(reminderKey)} disabled={!canSend}
                        style={{background:canSend?C.sky:"#E2E8F0",color:canSend?"#fff":C.muted,border:"none",borderRadius:6,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:canSend?"pointer":"not-allowed"}}>
                        Send Now
                      </button>
                    )}
                    {!canSend&&!isSent&&<div style={{fontSize:10,color:C.muted,textAlign:"right"}}>{!instDate?"No install date":"No customer email"}</div>}
                  </div>
                </div>
              );
            };

            return (
              <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{background:C.navy,padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:16}}>✉️</span>
                  <div>
                    <div style={{color:"#fff",fontWeight:700,fontSize:14}}>Customer Email Reminders</div>
                    <div style={{color:"rgba(255,255,255,0.6)",fontSize:11,marginTop:1}}>
                      Emails open in your mail client. Automated sending will be active once Azure is connected.
                    </div>
                  </div>
                </div>
                <div style={{padding:12,background:C.slateLight,display:"flex",flexDirection:"column",gap:8}}>
                  <ReminderRow label="7-Day Reminder" icon="📅" sendDate={weekDate} reminderKey="week" daysLabel="7 days"/>
                  <ReminderRow label="1-Day Reminder" icon="⏰" sendDate={dayDate} reminderKey="day" daysLabel="1 day"/>
                </div>
                <div style={{padding:"10px 14px",background:C.white,borderTop:`1px solid ${C.border}`}}>
                  <div style={{fontSize:11,color:C.muted}}>
                    📧 Sending to: <strong style={{color:C.text}}>{customerRec?.email||"No email on record"}</strong>
                    {customerRec?.email&&<span style={{marginLeft:6,color:C.slate}}>· Using <em>Install Reminder</em> template from Settings</span>}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ── Customer Feedback ── */}
          <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
            <div style={{background:"#7C3AED",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>⭐</span>
                <div>
                  <div style={{color:"#fff",fontWeight:700,fontSize:14}}>Customer Feedback</div>
                  <div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>Hand your phone to the customer to complete</div>
                </div>
              </div>
              {data.tabs.installation.feedback?(
                <span style={{background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:12}}>✓ Completed</span>
              ):(
                <button onClick={()=>setShowFeedbackForm(true)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                  Open Form →
                </button>
              )}
            </div>
            {data.tabs.installation.feedback?(()=>{
              const fb=data.tabs.installation.feedback;
              return (
                <div style={{padding:16,background:C.white}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,fontSize:12,color:C.slate}}>
                    <span>Completed by <strong>{fb.signature}</strong></span>
                    <span>{fb.completedAt}</span>
                  </div>
                  {fb.responses.map((r,i)=>(
                    <div key={i} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                      <div style={{fontSize:13,color:C.slate,marginBottom:4}}>{r.question}</div>
                      {r.type==="stars"?(
                        <div style={{color:"#F59E0B",fontSize:18}}>{"★".repeat(r.answer||0)}{"☆".repeat(5-(r.answer||0))}</div>
                      ):(
                        <div style={{fontSize:14,fontWeight:600,color:r.answer==="Yes"?C.mint:r.answer==="No"?C.red:C.text}}>{r.answer||"—"}</div>
                      )}
                    </div>
                  ))}
                  <button onClick={()=>setShowFeedbackForm(true)} style={{marginTop:12,background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Re-open form</button>
                </div>
              );
            })():(
              <div style={{padding:16,textAlign:"center",color:C.muted,fontSize:13,background:C.slateLight}}>
                No feedback submitted yet. Tap "Open Form →" to launch the customer form.
              </div>
            )}
          </div>

          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <Btn onClick={()=>{onSave(data);onClose();}}>Save & Close</Btn>
          </div>
        </div>
      )}

      {showFeedbackForm&&isJob&&(
        <FeedbackFormModal
          job={data} customers={customers} settings={settings}
          onSubmit={result=>{
            setData(d=>({...d,tabs:{...d.tabs,installation:{...d.tabs.installation,feedback:result}}}));
            setShowFeedbackForm(false);
            onSave({...data,tabs:{...data.tabs,installation:{...data.tabs.installation,feedback:result}}});
          }}
          onClose={()=>setShowFeedbackForm(false)}
        />
      )}
      {activeTab==="Guarantee"&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{background:C.slateLight,borderRadius:8,padding:14}}>
            <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:C.navy}}>🏅 Customer Guarantees & Certificates</p>
            <p style={{margin:"0 0 14px",fontSize:13,color:C.slate}}>Attach guarantee documents, FENSA certificates, or any other certification for this job.</p>
            <FileAttach
              files={data.tabs.guarantee.files}
              onAdd={f=>setData(d=>({...d,tabs:{...d.tabs,guarantee:{...d.tabs.guarantee,files:[...d.tabs.guarantee.files,f]}}}))}
              onRemove={i=>setData(d=>({...d,tabs:{...d.tabs,guarantee:{...d.tabs.guarantee,files:d.tabs.guarantee.files.filter((_,idx)=>idx!==i)}}}))}
              accept=".pdf,application/pdf,image/*"
              label="Attach Guarantee / Certificate"
            />
            {data.tabs.guarantee.files.length===0&&(
              <div style={{textAlign:"center",padding:"20px 0 8px",color:C.muted,fontSize:13}}>No guarantees attached yet.</div>
            )}
          </div>
          <TA label="Notes" value={data.tabs.guarantee.notes||""} onChange={e=>setData(d=>({...d,tabs:{...d.tabs,guarantee:{...d.tabs.guarantee,notes:e.target.value}}}))}
            placeholder="e.g. 10-year frame guarantee issued, FENSA cert #12345 sent to customer on 20 June..."/>
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <Btn onClick={()=>{onSave(data);onClose();}}>Save & Close</Btn>
          </div>
        </div>
      )}
      {/* ── TASKS TAB ── */}
      {activeTab==="Tasks"&&(()=>{
        const tasks=data.tabs.tasks||[];
        const today=new Date().toISOString().slice(0,10);

        const addTask=()=>setData(d=>({...d,tabs:{...d.tabs,tasks:[...( d.tabs.tasks||[]),{id:uid(),title:"",dueDate:"",assignedTo:"",done:false,createdAt:new Date().toISOString().slice(0,10)}]}}));
        const updateTask=(tid,field,val)=>setData(d=>({...d,tabs:{...d.tabs,tasks:(d.tabs.tasks||[]).map(t=>t.id===tid?{...t,[field]:val}:t)}}));
        const removeTask=(tid)=>setData(d=>({...d,tabs:{...d.tabs,tasks:(d.tabs.tasks||[]).filter(t=>t.id!==tid)}}));

        const open=tasks.filter(t=>!t.done);
        const done=tasks.filter(t=>t.done);

        return (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,color:C.slate}}>{open.length} open · {done.length} completed</div>
              <Btn onClick={addTask} style={{fontSize:13,padding:"6px 14px"}}>+ Add Task</Btn>
            </div>

            {tasks.length===0&&(
              <div style={{textAlign:"center",padding:"32px 20px",color:C.muted,background:C.slateLight,borderRadius:8,fontSize:14}}>
                No tasks yet. Click <strong>+ Add Task</strong> to create one.
              </div>
            )}

            {/* Open tasks */}
            {open.map(task=>{
              const isOverdue=task.dueDate&&task.dueDate<today;
              const isDueToday=task.dueDate===today;
              return (
                <div key={task.id} style={{background:C.white,border:`1px solid ${isOverdue?C.red:isDueToday?C.amber:C.border}`,borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    {/* Checkbox */}
                    <button onClick={()=>updateTask(task.id,"done",true)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${C.border}`,background:"transparent",cursor:"pointer",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center"}}/>
                    <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                      <input value={task.title} onChange={e=>updateTask(task.id,"title",e.target.value)}
                        placeholder="Task description..." style={{border:"none",outline:"none",fontSize:14,fontWeight:600,color:C.text,background:"transparent",width:"100%",padding:0}}/>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                        <div>
                          <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:3}}>Due Date</label>
                          <input type="date" value={task.dueDate||""} onChange={e=>updateTask(task.id,"dueDate",e.target.value)}
                            style={{border:`1px solid ${isOverdue?C.red:isDueToday?C.amber:C.border}`,borderRadius:6,padding:"5px 8px",fontSize:13,outline:"none",width:"100%",color:isOverdue?C.red:isDueToday?"#92400E":C.text,background:isOverdue?"#FEF2F2":isDueToday?"#FFFBEB":C.white}}/>
                          {isOverdue&&<div style={{fontSize:11,color:C.red,fontWeight:600,marginTop:2}}>⚠ Overdue</div>}
                          {isDueToday&&<div style={{fontSize:11,color:"#92400E",fontWeight:600,marginTop:2}}>📌 Due today</div>}
                        </div>
                        <div>
                          <label style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:3}}>Assigned To</label>
                          <select value={task.assignedTo||""} onChange={e=>updateTask(task.id,"assignedTo",e.target.value)}
                            style={{border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 8px",fontSize:13,outline:"none",width:"100%",background:C.white,color:C.text}}>
                            <option value="">— Unassigned —</option>
                            {[...(data._settings?.staff||DEFAULT_STAFF),...(data._settings?.fitters||DEFAULT_FITTERS)].map(p=><option key={p}>{p}</option>)}
                          </select>
                        </div>
                      </div>
                    </div>
                    <button onClick={()=>removeTask(task.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18,lineHeight:1,flexShrink:0,padding:"0 2px"}}>×</button>
                  </div>
                </div>
              );
            })}

            {/* Completed tasks */}
            {done.length>0&&(
              <div>
                <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8,paddingTop:4}}>Completed</div>
                {done.map(task=>(
                  <div key={task.id} style={{background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10,opacity:0.7}}>
                    <button onClick={()=>updateTask(task.id,"done",false)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${C.mint}`,background:C.mint,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:700}}>✓</button>
                    <span style={{fontSize:14,color:C.slate,textDecoration:"line-through",flex:1}}>{task.title||"Untitled task"}</span>
                    {task.assignedTo&&<span style={{fontSize:12,color:C.muted}}>{task.assignedTo}</span>}
                    <button onClick={()=>removeTask(task.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
                  </div>
                ))}
              </div>
            )}

            <div style={{display:"flex",justifyContent:"flex-end",paddingTop:8,borderTop:`1px solid ${C.border}`}}>
              <Btn onClick={()=>{onSave(data);onClose();}}>Save & Close</Btn>
            </div>
          </div>
        );
      })()}

      {/* ── SERVICE CALL TAB ── */}
      {activeTab==="Service Call"&&(()=>{
        const sc=data.tabs.serviceCall||{notes:"",officePhotos:[],bookings:[]};
        const updateSC=(field,val)=>setData(d=>({...d,tabs:{...d.tabs,serviceCall:{...d.tabs.serviceCall,[field]:val}}}));
        const addOfficePhoto=async(e)=>{
          const files=Array.from(e.target.files);
          const datas=await Promise.all(files.map(readFileAsDataURL));
          updateSC("officePhotos",[...(sc.officePhotos||[]),...datas]);
          e.target.value="";
        };
        const removeOfficePhoto=(i)=>updateSC("officePhotos",(sc.officePhotos||[]).filter((_,idx)=>idx!==i));
        const addFitterPhoto=async(e)=>{
          const files=Array.from(e.target.files);
          const datas=await Promise.all(files.map(readFileAsDataURL));
          updateSC("fitterPhotos",[...(sc.fitterPhotos||[]),...datas]);
          e.target.value="";
        };
        const removeFitterPhoto=(i)=>updateSC("fitterPhotos",(sc.fitterPhotos||[]).filter((_,idx)=>idx!==i));
        const addSupplierInvoice=async(e)=>{
          const file=e.target.files[0]; if(!file) return;
          const data2=await readFileAsDataURL(file);
          updateSC("supplierInvoices",[...(sc.supplierInvoices||[]),data2]);
          e.target.value="";
        };
        const removeSupplierInvoice=(i)=>updateSC("supplierInvoices",(sc.supplierInvoices||[]).filter((_,idx)=>idx!==i));
        const addBooking=()=>updateSC("bookings",[...(sc.bookings||[]),{id:uid(),date:"",startTime:"",endTime:"",fitter:"",notes:""}]);
        const updateBooking=(bid,field,val)=>updateSC("bookings",(sc.bookings||[]).map(b=>b.id===bid?{...b,[field]:val}:b));
        const removeBooking=(bid)=>updateSC("bookings",(sc.bookings||[]).filter(b=>b.id!==bid));
        const calcDuration=(start,end)=>{
          if(!start||!end) return null;
          const [sh,sm]=start.split(":").map(Number);
          const [eh,em]=end.split(":").map(Number);
          const mins=(eh*60+em)-(sh*60+sm);
          if(mins<=0) return null;
          const hrs=Math.floor(mins/60),m=mins%60;
          return hrs>0?`${hrs}hr${hrs!==1?"s":""}${m>0?` ${m}min`:""}`:` ${m}min`;
        };
        return (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {/* Notes */}
            <div style={{background:C.slateLight,borderRadius:8,padding:14}}>
              <div style={{fontSize:12,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>
                📋 Service Call Notes
                <span style={{fontSize:11,fontWeight:400,color:C.muted,marginLeft:8,textTransform:"none",letterSpacing:0}}>Visible to fitters in their app</span>
              </div>
              <TA value={sc.notes||""} onChange={e=>updateSC("notes",e.target.value)}
                placeholder={"e.g.\n• Window handle broken on master bedroom\n• Draught through bottom seal on front door\n• Customer confirmed issue started after last install"}
                style={{minHeight:130,background:C.white}}/>
            </div>

            {/* Office photos */}
            <div style={{background:C.white,borderRadius:8,padding:14,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:12,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Office Photos</div>
              <label style={{display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",background:C.navy,color:"#fff",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,marginBottom:12}}>
                📷 Office Photos
                <input type="file" accept="image/*" multiple onChange={addOfficePhoto} style={{display:"none"}}/>
              </label>
              {(sc.officePhotos||[]).length===0&&(
                <div style={{fontSize:13,color:C.muted,fontStyle:"italic"}}>No photos yet. Upload any photos sent in by the customer.</div>
              )}
              {(sc.officePhotos||[]).length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8,marginTop:4}}>
                  {(sc.officePhotos||[]).map((img,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",aspectRatio:"1",border:`1px solid ${C.border}`}}>
                      <img src={img.data} alt={img.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      <button onClick={()=>removeOfficePhoto(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Supplier invoices */}
            <div style={{background:C.white,borderRadius:8,padding:14,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:12,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>📄 Supplier Invoices</div>
              <label style={{display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",background:C.sky,color:"#fff",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,marginBottom:12}}>
                📎 Attach Supplier Invoice (PDF)
                <input type="file" accept=".pdf,application/pdf" onChange={addSupplierInvoice} style={{display:"none"}}/>
              </label>
              {(sc.supplierInvoices||[]).length===0&&(
                <div style={{fontSize:13,color:C.muted,fontStyle:"italic"}}>No supplier invoices attached yet.</div>
              )}
              {(sc.supplierInvoices||[]).length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {(sc.supplierInvoices||[]).map((f,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:C.slateLight,borderRadius:6,padding:"7px 12px"}}>
                      <span style={{fontSize:18}}>📄</span>
                      <a href={f.data} download={f.name} style={{fontSize:13,color:C.sky,fontWeight:500,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</a>
                      <button onClick={()=>removeSupplierInvoice(i)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Fitter photos */}
            <div style={{background:"#F0FDF4",borderRadius:8,padding:14,border:"1px solid #86EFAC"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#15803D",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Fitter Photos</div>
              <label style={{display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",background:C.mint,color:"#fff",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,marginBottom:12}}>
                📷 Fitter Photos
                <input type="file" accept="image/*" multiple onChange={addFitterPhoto} style={{display:"none"}}/>
              </label>
              <div style={{fontSize:11,color:"#166534",marginBottom:10}}>Photos added by the fitter once the service call work is complete. Fitters can also add photos directly from their app.</div>
              {(sc.fitterPhotos||[]).length===0&&(
                <div style={{fontSize:13,color:"#15803D",fontStyle:"italic",opacity:0.7}}>No fitter photos yet.</div>
              )}
              {(sc.fitterPhotos||[]).length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8}}>
                  {(sc.fitterPhotos||[]).map((img,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",aspectRatio:"1",border:"1px solid #86EFAC"}}>
                      <img src={img.data} alt={img.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      <button onClick={()=>removeFitterPhoto(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Bookings */}
            <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
              <div style={{background:C.navy,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:16}}>🔧</span>
                  <div>
                    <div style={{color:"#fff",fontWeight:700,fontSize:14}}>Service Call Bookings</div>
                    <div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{(sc.bookings||[]).length} booking{(sc.bookings||[]).length!==1?"s":""} · Appear on Fitter Calendar</div>
                  </div>
                </div>
                <button onClick={addBooking} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Book Service Call</button>
              </div>
              {(sc.bookings||[]).length===0&&(
                <div style={{padding:"18px 16px",textAlign:"center",color:C.muted,fontSize:13,background:C.slateLight}}>No service calls booked yet.</div>
              )}
              {(sc.bookings||[]).map((b,i)=>{
                const dur=calcDuration(b.startTime,b.endTime);
                const isPast=b.date&&b.date<new Date().toISOString().slice(0,10);
                return (
                  <div key={b.id} style={{padding:14,borderBottom:`1px solid ${C.border}`,background:isPast?"#FAFAFA":C.white}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.navy,display:"flex",alignItems:"center",gap:8}}>
                        Service Call {i+1}
                        {isPast&&<span style={{background:C.slateLight,color:C.muted,fontSize:11,padding:"2px 8px",borderRadius:10}}>Past</span>}
                      </div>
                      <button onClick={()=>removeBooking(b.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                      {[["Date","date","date"],["Start Time","time","startTime"],["End Time","time","endTime"]].map(([lbl,type,field])=>(
                        <div key={field}>
                          <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>{lbl}</label>
                          <input type={type} value={b[field]||""} onChange={e=>updateBooking(b.id,field,e.target.value)}
                            style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                        </div>
                      ))}
                    </div>
                    <div style={{marginBottom:10}}>
                      <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Assign Fitter</label>
                      <select value={b.fitter||""} onChange={e=>updateBooking(b.id,"fitter",e.target.value)}
                        style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white}}>
                        <option value="">— Select Fitter —</option>
                        {(settings?.fitters||DEFAULT_FITTERS).map(f=><option key={f}>{f}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Booking Notes</label>
                      <input value={b.notes||""} onChange={e=>updateBooking(b.id,"notes",e.target.value)}
                        placeholder="e.g. Check rear door seal and bedroom window handle"
                        style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                    </div>
                    {b.date&&b.fitter&&(
                      <div style={{marginTop:10,background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:6,padding:"8px 12px",fontSize:12,color:"#15803D",fontWeight:600}}>
                        ✅ {b.fitter} · {new Date(b.date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}
                        {b.startTime&&` · ${b.startTime}${b.endTime?` – ${b.endTime}`:""}`}
                        {dur&&<span style={{fontWeight:400,color:"#166534"}}> ({dur})</span>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <Btn onClick={()=>{onSave(data);onClose();}}>Save & Close</Btn>
            </div>
          </div>
        );
      })()}
    </Modal>
  );
};

// ── Customer / Lead Form (add new) ────────────────────────────────────────────
const CustomerForm = ({initial={},onSave,onCancel}) => {
  const [form,setForm]=useState({name:"",email:"",phone:"",address:"",source:"Website",stage:"New Enquiry",notes:"",windowcad:"",quoteValue:"",quoteCost:"",...initial});
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const margin=calcMargin(form.quoteValue,form.quoteCost);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Inp label="Full Name / Company" value={form.name} onChange={set("name")} placeholder="e.g. John Smith"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Inp label="Email" type="email" value={form.email} onChange={set("email")}/>
        <Inp label="Phone" value={form.phone} onChange={set("phone")}/>
      </div>
      <Inp label="Address" value={form.address} onChange={set("address")}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Sel label="Pipeline Stage" value={form.stage} onChange={set("stage")}>{LEAD_STAGES.map(s=><option key={s}>{s}</option>)}</Sel>
        <Sel label="Lead Source" value={form.source} onChange={set("source")}>{SOURCES.map(s=><option key={s}>{s}</option>)}</Sel>
      </div>
      <Inp label="WindowCAD7 Reference" value={form.windowcad} onChange={set("windowcad")} placeholder="WC-2025-001"/>
      <div style={{background:C.slateLight,borderRadius:8,padding:14}}>
        <div style={{fontSize:12,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:12}}>Quote Financials</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:margin?12:0}}>
          <Inp label="Quote Value (£)" type="number" value={form.quoteValue} onChange={set("quoteValue")} placeholder="4200"/>
          <Inp label="Total Cost (£)" type="number" value={form.quoteCost} onChange={set("quoteCost")} placeholder="2650"/>
        </div>
        {margin&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[["Gross Profit",`£${margin.profit.toLocaleString()}`,margin.profit>=0?C.mint:C.red],["Margin",`${margin.pct}%`,margin.profit>=0?C.mint:C.red]].map(([l,v,col])=>(
              <div key={l} style={{background:C.white,borderRadius:6,padding:"10px 12px",border:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.slate,marginBottom:2}}>{l}</div>
                <div style={{fontSize:18,fontWeight:800,color:col}}>{v}</div>
              </div>
            ))}

// ── Confetti ──────────────────────────────────────────────────────────────────
const Confetti = ({onDone}) => {
  const pieces = useMemo(()=>Array.from({length:120},(_,i)=>({
    id:i,
    x:Math.random()*100,
    delay:Math.random()*0.8,
    duration:1.8+Math.random()*1.4,
    size:7+Math.random()*9,
    color:["#4A90D9","#2CB67D","#F5A623","#E03E3E","#7C3AED","#FFD700","#FF6B6B","#4ECDC4","#45B7D1","#96CEB4"][Math.floor(Math.random()*10)],
    rotate:Math.random()*360,
    shape:Math.random()>0.5?"rect":"circle",
    drift:(Math.random()-0.5)*120,
  })),[]);

  useState(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t);});

  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,overflow:"hidden"}}>
      {/* Win overlay */}
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"rgba(0,0,0,0.45)",borderRadius:20,padding:"32px 48px",textAlign:"center",animation:"dealWonPop 0.4s cubic-bezier(0.34,1.56,0.64,1)"}}>
          <div style={{fontSize:56,marginBottom:8}}>🏆</div>
          <div style={{color:"#FFD700",fontWeight:900,fontSize:28,letterSpacing:1}}>DEAL WON!</div>
          <div style={{color:"rgba(255,255,255,0.85)",fontSize:14,marginTop:6}}>Job added to Installation Pipeline</div>
        </div>
      </div>
      {/* Confetti pieces */}
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:"absolute",
          left:`${p.x}%`,
          top:-20,
          width:p.shape==="circle"?p.size:p.size*0.6,
          height:p.shape==="circle"?p.size:p.size*1.4,
          borderRadius:p.shape==="circle"?"50%":"2px",
          background:p.color,
          animation:`confettiFall ${p.duration}s ${p.delay}s ease-in forwards`,
          transform:`rotate(${p.rotate}deg)`,
          opacity:0.95,
        }}/>
      ))}
      <style>{`
        @keyframes confettiFall {
          0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity:1; }
          100% { transform: translateY(110vh) translateX(${120}px) rotate(720deg); opacity:0.2; }
        }
        @keyframes dealWonPop {
          0%   { transform: scale(0.5); opacity:0; }
          100% { transform: scale(1); opacity:1; }
        }
      `}</style>
    </div>
  );
};

// ── Sales Pipeline Page ───────────────────────────────────────────────────────
const SalesPipelinePage = ({customers,setCustomers,jobs,setJobs,settings}) => {
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [defaultStage,setDefaultStage]=useState("New Enquiry");
  const [detailRecord,setDetailRecord]=useState(null);
  const [showConfetti,setShowConfetti]=useState(false);
  const [wonCustomer,setWonCustomer]=useState(null);

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return customers.filter(c=>!q||c.name.toLowerCase().includes(q)||c.phone.includes(q)||c.address.toLowerCase().includes(q));
  },[customers,search]);

  const margin=c=>calcMargin(c.quoteValue,c.quoteCost);

  const handleDealWon=(updated)=>{
    // Create a new job in Installation Pipeline under "Book Survey"
    const newJob={
      id:uid(),
      customerId:updated.id,
      title:`${updated.name} — Installation`,
      products:updated.productsOfInterest||[],
      status:"Book Survey",
      surveyDate:"",installDate:"",installers:"",
      windowcad:updated.windowcad||"",
      value:updated.quoteValue||"",
      notes:`Auto-created from Sales Pipeline deal won on ${new Date().toLocaleDateString("en-GB")}`,
      soldBy:updated.soldBy||"",
      tabs:emptyTabs(),
    };
    setJobs(js=>[newJob,...js]);
    setWonCustomer(updated.name);
    setShowConfetti(true);
  };

  const saveCustomer=(updated)=>{
    const prev=customers.find(c=>c.id===updated.id);
    const justWon=updated.stage==="Deal Won"&&prev?.stage!=="Deal Won";
    if(modal==="add"){
      setCustomers(cs=>[{...updated,id:uid(),createdAt:new Date().toISOString().slice(0,10)},...cs]);
      if(updated.stage==="Deal Won") handleDealWon({...updated,id:uid()});
    } else {
      setCustomers(cs=>cs.map(c=>c.id===updated.id?updated:c));
      if(justWon) handleDealWon(updated);
    }
    setModal(null);
  };

  // Also handle stage changes via kanban card detail inline save
  const handleCardSave=(updated)=>{
    const prev=customers.find(c=>c.id===updated.id);
    const justWon=updated.stage==="Deal Won"&&prev?.stage!=="Deal Won";
    setCustomers(cs=>cs.map(c=>c.id===updated.id?updated:c));
    if(justWon) handleDealWon(updated);
  };

  const deleteCustomer=(id)=>{
    if(!window.confirm("Delete this customer?")) return;
    setCustomers(cs=>cs.filter(c=>c.id!==id));
  };

  const renderCard=(c)=>{
    const m=margin(c);
    const temp=c.tabs?.quote?.leadTemp;
    const tempMeta={cold:{icon:"🥶",label:"Cold",bg:"#EFF6FF",color:"#1D4ED8"},warm:{icon:"🌡️",label:"Warm",bg:"#FFFBEB",color:"#92400E"},hot:{icon:"🔥",label:"Hot",bg:"#FEF2F2",color:"#DC2626"}};
    return (
      <div key={c.id} onClick={()=>setDetailRecord(c)}
        style={{background:C.white,border:`1px solid ${temp==="hot"?"#FECACA":temp==="warm"?"#FDE68A":C.border}`,borderRadius:8,padding:"11px 13px",marginBottom:7,cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}
        onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.1)"}
        onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,0.06)"}
      >
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
          <div style={{fontWeight:700,fontSize:13,color:C.text}}>{c.name}</div>
          {temp&&tempMeta[temp]&&(
            <span style={{background:tempMeta[temp].bg,color:tempMeta[temp].color,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,flexShrink:0,marginLeft:6}}>
              {tempMeta[temp].icon} {tempMeta[temp].label}
            </span>
          )}
        </div>
        <div style={{fontSize:12,color:C.slate,marginBottom:3}}>{c.phone}</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:c.quoteValue?7:0}}>{c.address}</div>
        {c.quoteValue&&(
          <div style={{display:"flex",gap:5,marginBottom:5}}>
            <div style={{background:C.skyLight,borderRadius:5,padding:"3px 7px",flex:1}}>
              <div style={{fontSize:10,color:C.slate}}>Quote</div>
              <div style={{fontSize:12,fontWeight:800,color:C.navy}}>£{Number(c.quoteValue).toLocaleString()}</div>
            </div>
            {m&&<div style={{background:m.profit>=0?"#F0FDF4":"#FEF2F2",borderRadius:5,padding:"3px 7px",flex:1}}>
              <div style={{fontSize:10,color:C.slate}}>Margin</div>
              <div style={{fontSize:12,fontWeight:800,color:m.profit>=0?C.mint:C.red}}>{m.pct}%</div>
            </div>}
          </div>
        )}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:10,background:C.slateLight,color:C.slate,padding:"2px 7px",borderRadius:10,fontWeight:500}}>{c.source}</span>
          {c.tabs?.quote?.expectedSaleDate?(
            <span style={{fontSize:10,color:C.sky,fontWeight:600}}>📅 {c.tabs.quote.expectedSaleDate}</span>
          ):(
            <span style={{fontSize:10,color:C.muted}}>{c.createdAt}</span>
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search pipeline…" style={{flex:1,maxWidth:300,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",fontSize:14,outline:"none"}}/>
        <Btn onClick={()=>setModal("add")}>+ New Enquiry</Btn>
      </div>
      <div style={{display:"flex",gap:10,overflowX:"auto",flex:1,paddingBottom:8,alignItems:"flex-start"}}>
        {LEAD_STAGES.map(stage=>{
          const stageItems=filtered.filter(c=>c.stage===stage);
          const stageRevenue=stageItems.reduce((sum,c)=>sum+(Number(c.quoteValue)||0),0);
          const marginsWithData=stageItems.map(c=>calcMargin(c.quoteValue,c.quoteCost)).filter(Boolean);
          const avgMargin=marginsWithData.length>0
            ?(marginsWithData.reduce((sum,m)=>sum+parseFloat(m.pct),0)/marginsWithData.length).toFixed(1)
            :null;
          return (
            <KanbanCol key={stage} stage={stage} meta={STAGE_META[stage]}
              items={stageItems}
              revenue={stageRevenue}
              avgMargin={avgMargin}
              onAdd={s=>{setDefaultStage(s);setModal("add");}}
              renderCard={renderCard}
            />
          );
        })}
      </div>
      {modal==="add"&&<Modal title="New Customer" onClose={()=>setModal(null)}><CustomerForm initial={{stage:defaultStage}} onSave={saveCustomer} onCancel={()=>setModal(null)}/></Modal>}
      {detailRecord&&<CardDetailModal record={customers.find(c=>c.id===detailRecord.id)||detailRecord} customers={customers} isJob={false} settings={settings}
        onSave={handleCardSave}
        onDelete={deleteCustomer} onClose={()=>setDetailRecord(null)}/>}
      {showConfetti&&<Confetti onDone={()=>setShowConfetti(false)}/>}
    </div>
  );
};

const CalendarPage = ({customers,jobs,settings}) => {
  const [viewDate,setViewDate]=useState(new Date(2025,5,1));
  const [filterFitter,setFilterFitter]=useState("All");

  const year=viewDate.getFullYear(), month=viewDate.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const adjusted=(firstDay+6)%7; // Mon=0

  // Gather all survey bookings from customer tabs
  const surveyEvents=customers.flatMap(c=>{
    const s=c.tabs?.survey;
    if(!s?.date||!s?.fitter) return [];
    return [{date:s.date,fitter:s.fitter,label:c.name,type:"Survey",color:"#4A90D9",time:s.time||""}];
  });
  // Installation bookings from job installation tab — expanded across working days
  const installTabEvents=jobs.flatMap(j=>{
    const inst=j.tabs?.installation;
    if(!inst?.date||(inst.fitters||[]).length===0) return [];
    const duration=Number(inst.duration||2);
    // Generate all working days for this install
    const workingDays=[];
    let current=new Date(inst.date);
    let remaining=duration;
    while(remaining>0){
      const dow=current.getDay();
      if(dow!==0&&dow!==6){
        workingDays.push(current.toISOString().slice(0,10));
        remaining-=remaining>=2?2:remaining;
      }
      current=new Date(current);
      current.setDate(current.getDate()+1);
    }
    return workingDays.flatMap(date=>
      (inst.fitters||[]).map(fitter=>({
        date,fitter,label:j.title,type:"Install",color:C.mint,
        notes:inst.fittersNotes,
        time:date===inst.date?(inst.startTime||""):"",
        isMultiDay:workingDays.length>1,
        dayIndex:workingDays.indexOf(date)+1,
        totalDays:workingDays.length,
      }))
    );
  });
  // Fallback: job installDate field
  const installFieldEvents=jobs.flatMap(j=>{
    if(!j.installDate||(j.tabs?.installation?.date)) return [];
    return [{date:j.installDate,fitter:j.installers||"Unassigned",label:j.title,type:"Install",color:C.mint}];
  });
  // Service call bookings from job cards
  const serviceCallEvents=jobs.flatMap(j=>{
    return (j.tabs?.serviceCall?.bookings||[]).flatMap(b=>{
      if(!b.date||!b.fitter) return [];
      return [{date:b.date,fitter:b.fitter,label:j.title,type:"Service Call",color:"#7C3AED",notes:b.notes||"",time:b.startTime||"",endTime:b.endTime||"",job:j}];
    });
  });
  const allEvents=[...surveyEvents,...installTabEvents,...installFieldEvents,...serviceCallEvents].filter(e=>filterFitter==="All"||e.fitter===filterFitter);

  const eventsForDay=(d)=>{
    const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return allEvents.filter(e=>e.date===ds);
  };

  const monthName=viewDate.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
  const prev=()=>setViewDate(new Date(year,month-1,1));
  const next=()=>setViewDate(new Date(year,month+1,1));

  const days=[];
  for(let i=0;i<adjusted;i++) days.push(null);
  for(let d=1;d<=daysInMonth;d++) days.push(d);

  const today=new Date();
  const isToday=(d)=>d&&today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,color:C.navy,fontWeight:800,fontSize:22}}>Fitter Calendar</h2>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <Sel value={filterFitter} onChange={e=>setFilterFitter(e.target.value)} style={{fontSize:13,padding:"6px 10px"}}>
            <option value="All">All Fitters</option>
            {(settings?.fitters||DEFAULT_FITTERS).map(f=><option key={f}>{f}</option>)}
          </Sel>
          <Btn variant="secondary" onClick={prev} style={{padding:"6px 12px"}}>‹</Btn>
          <span style={{fontWeight:700,color:C.navy,minWidth:160,textAlign:"center"}}>{monthName}</span>
          <Btn variant="secondary" onClick={next} style={{padding:"6px 12px"}}>›</Btn>
        </div>
      </div>

      {/* Fitter legend */}
      <div style={{display:"flex",gap:16,marginBottom:16,flexWrap:"wrap"}}>
        {[{label:"Survey",color:"#4A90D9"},{label:"Installation",color:C.mint},{label:"Service Call",color:"#7C3AED"}].map(({label,color})=>(
          <div key={label} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:C.slate}}>
            <div style={{width:12,height:12,borderRadius:3,background:color}}/>
            {label}
          </div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{background:C.white,borderRadius:10,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.navy}}>
          {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>(
            <div key={d} style={{padding:"10px 0",textAlign:"center",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.7)"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {days.map((d,i)=>{
            const events=d?eventsForDay(d):[];
            return (
              <div key={i} style={{minHeight:90,borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,padding:"6px 8px",background:d?C.white:"#FAFAFA"}}>
                {d&&<div style={{fontSize:13,fontWeight:isToday(d)?800:500,color:isToday(d)?C.sky:C.text,marginBottom:4,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isToday(d)?C.skyLight:"transparent"}}>{d}</div>}
                {events.map((ev,ei)=>(
                  <div key={ei} style={{background:ev.color,color:"#fff",borderRadius:4,padding:"3px 6px",fontSize:11,marginBottom:3,lineHeight:1.4}}>
                    <div style={{fontWeight:700}}>{ev.type}{ev.time?` · ${ev.time}`:""}{ev.isMultiDay?` (Day ${ev.dayIndex}/${ev.totalDays})`:""}</div>
                    <div style={{opacity:.9,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.label}</div>
                    <div style={{opacity:.75,fontSize:10}}>{ev.fitter}</div>
                    {ev.notes&&<div style={{opacity:.85,fontSize:10,marginTop:2,borderTop:"1px solid rgba(255,255,255,0.3)",paddingTop:2}}>{ev.notes.split("\n").slice(0,2).join(" · ")}</div>}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};
