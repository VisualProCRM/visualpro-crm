  }

  // ── Calendar view ──
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:C.slateLight,fontFamily:"'Inter','Segoe UI',sans-serif",maxWidth:430,margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:C.navy,padding:"20px 16px 16px",color:"#fff",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div>
            <div style={{fontSize:12,opacity:.6,textTransform:"uppercase",letterSpacing:"0.1em"}}>Fitter Portal</div>
            <div style={{fontSize:20,fontWeight:800}}>👷 {fitterName}</div>
          </div>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13}}>Log out</button>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:16}}>
        {/* Upcoming jobs */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Your Upcoming Jobs</div>
          {upcoming.length===0&&(
            <div style={{background:C.white,borderRadius:12,padding:24,textAlign:"center",color:C.muted,border:`1px solid ${C.border}`}}>No upcoming jobs assigned to you.</div>
          )}
          {(()=>{
            // Deduplicate — one card per unique job, keeping the earliest date
            const seen=new Set();
            const deduped=upcoming.filter(ev=>{
              const key=`${ev.type}-${ev.job.id}`;
              if(seen.has(key)) return false;
              seen.add(key); return true;
            });
            return deduped.map((ev,i)=>{
              const cust=customers.find(c=>c.id===ev.job.customerId);
              const isToday=ev.date===today;
              const inst=ev.job.tabs?.installation;
              const duration=inst?.duration?Number(inst.duration):2;
              const totalDays=ev.type==="Install"?Math.ceil(duration/2):null;
              const isHalfDay=duration===1;
              // Calculate end date (skipping weekends)
              let endDate="";
              if(ev.type==="Install"&&totalDays>1){
                let current=new Date(ev.date);
                let remaining=duration;
                let last=null;
                while(remaining>0){
                  const dow=current.getDay();
                  if(dow!==0&&dow!==6){last=current.toISOString().slice(0,10);remaining-=remaining>=2?2:remaining;}
                  current=new Date(current);current.setDate(current.getDate()+1);
                }
                endDate=last||ev.date;
              }
              const formatDate=(d)=>new Date(d).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});

              return (
                <div key={i} onClick={()=>{setSelectedJob(ev.job);setView("job");setActiveTab(ev.type==="Survey"?"survey":ev.type==="Service Call"?"servicecall":"installation");}}
                  style={{
                    background:ev.type==="Survey"?"#F0FDF4":ev.type==="Service Call"?"#FEF2F2":"#FEFCE8",
                    borderRadius:12,padding:16,marginBottom:10,
                    border:`2px solid ${ev.type==="Survey"?"#86EFAC":ev.type==="Service Call"?"#FECACA":"#FDE68A"}`,
                    boxShadow:isToday?`0 0 0 2px ${ev.type==="Survey"?"rgba(34,197,94,0.3)":ev.type==="Service Call"?"rgba(239,68,68,0.3)":"rgba(234,179,8,0.3)"}`:
                    "0 1px 4px rgba(0,0,0,0.05)",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <span style={{
                      background:ev.type==="Survey"?"#15803D":ev.type==="Service Call"?"#DC2626":"#92400E",
                      color:"#fff",fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:12
                    }}>{ev.type}</span>
                    {isToday&&<span style={{fontSize:12,fontWeight:700,color:ev.type==="Survey"?"#15803D":ev.type==="Service Call"?"#DC2626":"#92400E"}}>📌 Today</span>}
                  </div>
                  <div style={{fontWeight:700,fontSize:15,color:C.navy,marginBottom:4}}>{ev.job.title}</div>
                  <div style={{fontSize:13,color:C.slate}}>{cust?.name}</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2}}>{cust?.address}</div>
                  {/* Date info */}
                  <div style={{marginTop:8,padding:"8px 10px",background:C.slateLight,borderRadius:8}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.navy}}>
                      📅 {formatDate(ev.date)}
                    </div>
                    {ev.type==="Install"&&(
                      <div style={{fontSize:12,color:C.slate,marginTop:2}}>
                        {isHalfDay?"⏱ Half day (AM)":
                         endDate&&endDate!==ev.date?`📆 ${totalDays} day${totalDays!==1?"s":""} — finishes ${formatDate(endDate)}`:`⏱ 1 day`}
                      </div>
                    )}
                    {ev.type==="Survey"&&ev.job.tabs?.survey?.endTime&&(
                      <div style={{fontSize:12,color:C.slate,marginTop:2}}>
                        {(()=>{
                          const st=ev.job.tabs.survey.time;
                          const et=ev.job.tabs.survey.endTime;
                          if(!st||!et) return null;
                          const [sh,sm]=st.split(":").map(Number);
                          const [eh,em]=et.split(":").map(Number);
                          const totalMins=(eh*60+em)-(sh*60+sm);
                          if(totalMins<=0) return null;
                          const hrs=Math.floor(totalMins/60);
                          const mins=totalMins%60;
                          const label=hrs>0?`${hrs}hr${hrs!==1?"s":""}${mins>0?` ${mins}min`:""}`:` ${mins}min`;
                          return `⏱ Duration: ${label}`;
                        })()}
                      </div>
                    )}
                    {ev.time&&<div style={{fontSize:12,color:C.sky,marginTop:2,fontWeight:600}}>
                      🕐 {ev.time}{ev.type==="Survey"&&ev.job.tabs?.survey?.endTime?` – ${ev.job.tabs.survey.endTime}`:""}
                    </div>}
                  </div>
                </div>
              );
            });
          })()}
        </div>

        {/* Mini calendar */}
        <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
          <div style={{background:C.navy,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button onClick={()=>setViewDate(new Date(year,month-1,1))} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:18,padding:"0 4px"}}>‹</button>
            <span style={{color:"#fff",fontWeight:700,fontSize:14}}>{viewDate.toLocaleDateString("en-GB",{month:"long",year:"numeric"})}</span>
            <button onClick={()=>setViewDate(new Date(year,month+1,1))} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:18,padding:"0 4px"}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.slateLight}}>
            {["M","T","W","T","F","S","S"].map((d,i)=>(
              <div key={i} style={{textAlign:"center",padding:"6px 0",fontSize:11,fontWeight:700,color:C.slate}}>{d}</div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
            {days.map((d,i)=>{
              const evts=d?eventsForDay(d):[];
              const ds=d?`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`:"";
              const isToday=ds===today;
              return (
                <div key={i} style={{minHeight:52,borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,padding:"4px",background:d?C.white:"#FAFAFA"}}>
                  {d&&<div style={{fontSize:12,fontWeight:isToday?800:400,color:isToday?C.white:C.text,width:22,height:22,borderRadius:"50%",background:isToday?C.sky:"transparent",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 2px"}}>{d}</div>}
                  {evts.map((ev,ei)=>(
                    <div key={ei} onClick={()=>{setSelectedJob(ev.job);setView("job");setActiveTab(ev.type==="Survey"?"survey":"installation");}}
                      style={{background:ev.type==="Survey"?C.sky:C.mint,borderRadius:3,padding:"1px 4px",fontSize:9,color:"#fff",fontWeight:700,marginBottom:2,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {ev.type}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};
// ── Track Orders Page ──────────────────────────────────────────────────────────
const TrackOrdersPage = ({jobs,customers}) => {
  const [viewDate,setViewDate]=useState(new Date());
  const [orders,setOrders]=useState([]);
  const [showModal,setShowModal]=useState(false);
  const [editOrder,setEditOrder]=useState(null);
  const [form,setForm]=useState({jobId:"",supplier:"",description:"",deliveryDate:"",status:"Ordered",notes:""});

  const ORDER_STATUSES=["Ordered","In Transit","Out for Delivery","Delivered","Delayed"];
  const STATUS_STYLE={
    "Ordered":{bg:"#EEF2FF",text:"#4338CA"},
    "In Transit":{bg:"#FFF7ED",text:"#C2410C"},
    "Out for Delivery":{bg:"#FEFCE8",text:"#854D0E"},
    "Delivered":{bg:"#F0FDF4",text:"#15803D"},
    "Delayed":{bg:"#FEF2F2",text:"#DC2626"},
  };

  const year=viewDate.getFullYear(), month=viewDate.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const adjusted=(firstDay+6)%7;
  const days=[];
  for(let i=0;i<adjusted;i++) days.push(null);
  for(let d=1;d<=daysInMonth;d++) days.push(d);

  const today=new Date().toISOString().slice(0,10);

  // Pull deliveries from job cards and merge with manually added orders
  const jobDeliveries=useMemo(()=>{
    const result=[];
    jobs.forEach(job=>{
      const cust=customers.find(c=>c.id===job.customerId);
      (job.tabs?.installation?.deliveries||[]).forEach(dv=>{
        if(!dv.deliveryDate) return;
        result.push({
          id:`job-${job.id}-${dv.id}`,
          description:dv.description||"Delivery",
          supplier:dv.supplier||"",
          deliveryDate:dv.deliveryDate,
          status:dv.status||"Ordered",
          notes:dv.notes||"",
          jobId:job.id,
          jobTitle:job.title,
          customerName:cust?.name||"",
          fromJobCard:true,
        });
      });
    });
    return result;
  },[jobs,customers]);

  // Combined list for calendar — manual orders + job card deliveries
  const allOrders=useMemo(()=>[...orders,...jobDeliveries],[orders,jobDeliveries]);

  const ordersForDay=(d)=>{
    const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return allOrders.filter(o=>o.deliveryDate===ds);
  };

  const customerName=(jobId)=>{
    const job=jobs.find(j=>j.id===Number(jobId));
    const cust=customers.find(c=>c.id===job?.customerId);
    return cust?.name||"";
  };

  const openAdd=()=>{setForm({jobId:jobs[0]?.id||"",supplier:"",description:"",deliveryDate:"",status:"Ordered",notes:""});setEditOrder(null);setShowModal(true);};
  const openEdit=(o)=>{setForm({...o});setEditOrder(o);setShowModal(true);};

  const saveOrder=()=>{
    if(!form.deliveryDate||!form.description) return;
    if(editOrder){
      setOrders(os=>os.map(o=>o.id===editOrder.id?{...form,id:editOrder.id}:o));
    } else {
      setOrders(os=>[...os,{...form,id:uid()}]);
    }
    setShowModal(false);
  };

  const deleteOrder=(id)=>{
    if(!window.confirm("Delete this order?")) return;
    setOrders(os=>os.filter(o=>o.id!==id));
  };

  // Upcoming deliveries (next 14 days) — from both sources
  const upcoming=allOrders.filter(o=>{
    const d=new Date(o.deliveryDate);
    const now=new Date();
    const in14=new Date();in14.setDate(in14.getDate()+14);
    return d>=now&&d<=in14&&o.status!=="Delivered";
  }).sort((a,b)=>a.deliveryDate.localeCompare(b.deliveryDate));

  const overdue=allOrders.filter(o=>o.deliveryDate<today&&o.status!=="Delivered");

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,color:C.navy,fontWeight:800,fontSize:22}}>📦 Track Orders</h2>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{fontSize:12,color:C.slate}}>
            <span style={{background:C.skyLight,color:C.sky,padding:"2px 8px",borderRadius:8,fontWeight:600,marginRight:6}}>📋 {jobDeliveries.length} from job cards</span>
            <span style={{background:C.slateLight,color:C.slate,padding:"2px 8px",borderRadius:8,fontWeight:600}}>➕ {orders.length} manual</span>
          </div>
          <Btn onClick={openAdd}>+ Add Delivery</Btn>
        </div>
      </div>

      {/* Overdue alert */}
      {overdue.length>0&&(
        <div style={{background:"#FEF2F2",border:`1px solid ${C.red}`,borderRadius:10,padding:14,marginBottom:20}}>
          <div style={{fontWeight:700,color:C.red,fontSize:14,marginBottom:8}}>🚨 {overdue.length} Overdue Deliver{overdue.length>1?"ies":"y"}</div>
          {overdue.map(o=>(
            <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,padding:"4px 0",borderBottom:`1px solid #FECACA`}}>
              <span style={{color:C.text,fontWeight:600}}>{o.description}</span>
              <span style={{color:C.red,fontWeight:600}}>{o.deliveryDate}</span>
            </div>
          ))}
        </div>
      )}

      {/* Upcoming deliveries */}
      {upcoming.length>0&&(
        <div style={{background:C.white,borderRadius:10,border:`1px solid ${C.border}`,padding:16,marginBottom:20}}>
          <div style={{fontWeight:700,color:C.navy,fontSize:14,marginBottom:12}}>📅 Upcoming Deliveries (Next 14 Days)</div>
          {upcoming.map(o=>{
            const st=STATUS_STYLE[o.status]||STATUS_STYLE["Ordered"];
            return (
              <div key={o.id} onClick={()=>!o.fromJobCard&&openEdit(o)}
                style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}`,cursor:o.fromJobCard?"default":"pointer"}}>
                <div style={{width:44,textAlign:"center",flexShrink:0}}>
                  <div style={{fontSize:18,fontWeight:800,color:C.navy}}>{new Date(o.deliveryDate).getDate()}</div>
                  <div style={{fontSize:10,color:C.muted}}>{new Date(o.deliveryDate).toLocaleDateString("en-GB",{month:"short"})}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.description}</div>
                  <div style={{fontSize:12,color:C.slate,marginTop:1}}>
                    {o.supplier&&<span>{o.supplier} · </span>}
                    {o.fromJobCard?(
                      <span>{o.jobTitle||""}{o.customerName?` · ${o.customerName}`:""}</span>
                    ):(
                      <span>{customerName(o.jobId)}</span>
                    )}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                  {o.fromJobCard&&<span style={{background:C.skyLight,color:C.sky,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:8}}>📋 Job Card</span>}
                  <span style={{background:st.bg,color:st.text,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:12}}>{o.status}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Calendar */}
      <div style={{background:C.white,borderRadius:10,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        <div style={{background:C.navy,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <Btn variant="secondary" onClick={()=>setViewDate(new Date(year,month-1,1))} style={{padding:"5px 12px",background:"rgba(255,255,255,0.1)",color:"#fff",border:"none"}}>‹</Btn>
          <span style={{color:"#fff",fontWeight:700,fontSize:15}}>{viewDate.toLocaleDateString("en-GB",{month:"long",year:"numeric"})}</span>
          <Btn variant="secondary" onClick={()=>setViewDate(new Date(year,month+1,1))} style={{padding:"5px 12px",background:"rgba(255,255,255,0.1)",color:"#fff",border:"none"}}>›</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.navy}}>
          {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>(
            <div key={d} style={{padding:"8px 0",textAlign:"center",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.6)"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {days.map((d,i)=>{
            const dayOrders=d?ordersForDay(d):[];
            const ds=d?`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`:"";
            const isToday=ds===today;
            return (
              <div key={i} style={{minHeight:100,borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,padding:"6px 6px",background:d?C.white:"#FAFAFA",verticalAlign:"top"}}>
                {d&&(
                  <>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{fontSize:13,fontWeight:isToday?800:500,color:isToday?C.white:C.text,width:24,height:24,borderRadius:"50%",background:isToday?C.sky:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{d}</div>
                      <button onClick={()=>{setForm({jobId:jobs[0]?.id||"",supplier:"",description:"",deliveryDate:ds,status:"Ordered",notes:""});setEditOrder(null);setShowModal(true);}}
                        style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,lineHeight:1,padding:0,opacity:0}}>+
                      </button>
                    </div>
                    {dayOrders.map(o=>{
                      const st=STATUS_STYLE[o.status]||STATUS_STYLE["Ordered"];
                      return (
                        <div key={o.id} onClick={()=>openEdit(o)} style={{background:st.bg,color:st.text,borderRadius:4,padding:"3px 6px",fontSize:11,marginBottom:3,cursor:"pointer",lineHeight:1.4}}>
                          <div style={{fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.description}</div>
                          {o.supplier&&<div style={{opacity:.8,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.supplier}</div>}
                        </div>
                      );
                    })}
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* All orders list */}
      {allOrders.length>0&&(
        <div style={{background:C.white,borderRadius:10,border:`1px solid ${C.border}`,padding:20,marginTop:20}}>
          <div style={{fontWeight:700,color:C.navy,fontSize:14,marginBottom:14}}>All Orders ({allOrders.length})</div>
          {[...allOrders].sort((a,b)=>a.deliveryDate.localeCompare(b.deliveryDate)).map(o=>{
            const st=STATUS_STYLE[o.status]||STATUS_STYLE["Ordered"];
            return (
              <div key={o.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.text}}>{o.description}</div>
                    {o.fromJobCard&&<span style={{background:C.skyLight,color:C.sky,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:8,flexShrink:0}}>📋 Job Card</span>}
                  </div>
                  <div style={{fontSize:12,color:C.slate,marginTop:1}}>
                    {o.supplier&&<span>{o.supplier} · </span>}
                    {o.fromJobCard?<span>{o.jobTitle}{o.customerName?` · ${o.customerName}`:""}</span>:<span>{customerName(o.jobId)}</span>}
                    <span> · Due {o.deliveryDate}</span>
                  </div>
                  {o.notes&&<div style={{fontSize:12,color:C.muted,marginTop:2,fontStyle:"italic"}}>{o.notes}</div>}
                </div>
                <span style={{background:st.bg,color:st.text,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:12,flexShrink:0}}>{o.status}</span>
                {!o.fromJobCard&&(
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <Btn variant="secondary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openEdit(o)}>Edit</Btn>
                    <Btn variant="danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>deleteOrder(o.id)}>×</Btn>
                  </div>
                )}
                {o.fromJobCard&&(
                  <div style={{fontSize:11,color:C.muted,flexShrink:0}}>Edit in job card</div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Add/Edit Modal */}
      {showModal&&(
        <Modal title={editOrder?"Edit Order":"Add Delivery"} onClose={()=>setShowModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Inp label="Product / Description" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="e.g. Casement windows x6 — white"/>
            <Inp label="Supplier" value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))} placeholder="e.g. Epwin Group"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Inp label="Expected Delivery Date" type="date" value={form.deliveryDate} onChange={e=>setForm(f=>({...f,deliveryDate:e.target.value}))}/>
              <Sel label="Status" value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
                {ORDER_STATUSES.map(s=><option key={s}>{s}</option>)}
              </Sel>
            </div>
            <Sel label="Linked Job (optional)" value={form.jobId} onChange={e=>setForm(f=>({...f,jobId:e.target.value}))}>
              <option value="">— No job linked —</option>
              {jobs.map(j=><option key={j.id} value={j.id}>{j.title} · {customerName(j.id)}</option>)}
            </Sel>
            <TA label="Notes" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="e.g. Part order — handles arriving separately"/>
            <div style={{display:"flex",gap:10,justifyContent:"space-between",paddingTop:8,borderTop:`1px solid ${C.border}`}}>
              {editOrder?<Btn variant="danger" onClick={()=>{deleteOrder(editOrder.id);setShowModal(false);}}>Delete</Btn>:<div/>}
              <div style={{display:"flex",gap:10}}>
                <Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn>
                <Btn onClick={saveOrder}>Save Order</Btn>
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ── Customer Directory Page ───────────────────────────────────────────────────
const CustomerDirectoryPage = ({customers,setCustomers,jobs,setJobs,settings,onNavigate}) => {
  const [search,setSearch]=useState("");
  const [selectedCustomer,setSelectedCustomer]=useState(null);
  const [showAddModal,setShowAddModal]=useState(false);
  const [editModal,setEditModal]=useState(false);
  const [selectedJob,setSelectedJob]=useState(null);
  const [addJobModal,setAddJobModal]=useState(false);

  // Auto-select from global search
  useState(()=>{
    if(window._gsCustId){
      const c=customers.find(x=>x.id===window._gsCustId);
      if(c) setSelectedCustomer(c);
      if(window._gsJobId){
        const j=jobs.find(x=>x.id===window._gsJobId);
        if(j) setTimeout(()=>setSelectedJob(j),100);
      }
      window._gsCustId=null;
      window._gsJobId=null;
    }
  });

  const filtered=useMemo(()=>{
    const q=search.toLowerCase().trim();
    return customers.filter(c=>!q||
      c.name.toLowerCase().includes(q)||
      (c.phone||"").includes(q)||
      (c.email||"").toLowerCase().includes(q)||
      (c.address||"").toLowerCase().includes(q)
    ).sort((a,b)=>a.name.localeCompare(b.name));
  },[customers,search]);

  const customerJobs=(cid)=>jobs.filter(j=>j.customerId===cid);

  const saveCustomer=(form)=>{
    if(editModal){
      setCustomers(cs=>cs.map(c=>c.id===form.id?form:c));
      setSelectedCustomer(form);
    } else {
      const nc={...form,id:uid(),createdAt:new Date().toISOString().slice(0,10),stage:"New Enquiry",tabs:{quote:{files:[],notes:""},invoices:{files:[],notes:""},notepad:{text:""},survey:{files:[],images:[],notes:"",date:"",fitter:"",time:"",endTime:""},orderConfirmation:{files:[],notes:""},bills:{files:[],costs:"",notes:""},installation:{date:"",fitters:[],fittersNotes:"",startTime:"",duration:"2",emailReminders:{week:{status:"pending",sentAt:""},day:{status:"pending",sentAt:""}},deliveries:[]},guarantee:{files:[],notes:""},tasks:[],serviceCall:{notes:"",officePhotos:[],fitterPhotos:[],supplierInvoices:[],bookings:[]}}};
      setCustomers(cs=>[nc,...cs]);
      setSelectedCustomer(nc);
    }
    setShowAddModal(false);setEditModal(false);
  };

  const deleteCustomer=(id)=>{
    if(!window.confirm("Delete this customer and all their data?")) return;
    setCustomers(cs=>cs.filter(c=>c.id!==id));
    setSelectedCustomer(null);
  };

  const saveJob=(form)=>{
    setJobs(js=>[{...form,id:uid()},...js]);
    setAddJobModal(false);
  };

  const cust=selectedCustomer?customers.find(c=>c.id===selectedCustomer.id)||selectedCustomer:null;
  const custJobs=cust?customerJobs(cust.id):[];

  return (
    <div style={{display:"flex",height:"100%",gap:0}}>

      {/* Left — customer list */}
      <div style={{width:280,flexShrink:0,display:"flex",flexDirection:"column",borderRight:`1px solid ${C.border}`}}>
        <div style={{padding:"0 0 14px 0",display:"flex",flexDirection:"column",gap:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customers…"
            style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"}}/>
          <Btn onClick={()=>setShowAddModal(true)} style={{width:"100%",justifyContent:"center"}}>+ Add Customer</Btn>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {filtered.length===0&&<div style={{textAlign:"center",padding:32,color:C.muted,fontSize:13}}>No customers found.</div>}
          {filtered.map(c=>{
            const cJobs=customerJobs(c.id);
            const isSelected=selectedCustomer?.id===c.id;
            return (
              <div key={c.id} onClick={()=>{setSelectedCustomer(c);setSelectedJob(null);}}
                style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",
                  background:isSelected?C.skyLight:"transparent",borderLeft:`3px solid ${isSelected?C.sky:"transparent"}`}}>
                <div style={{fontWeight:700,fontSize:14,color:C.navy,marginBottom:2,display:"flex",alignItems:"center",gap:6}}>
                  {c.type==="company"&&<span style={{fontSize:10,background:"#EDE9FE",color:"#6D28D9",padding:"1px 6px",borderRadius:6,fontWeight:700,flexShrink:0}}>🏢</span>}
                  {c.name}
                </div>
                <div style={{fontSize:12,color:C.slate,marginBottom:2}}>{c.phone}</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.address}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {cJobs.length>0&&<span style={{fontSize:10,background:C.skyLight,color:C.sky,padding:"1px 7px",borderRadius:8,fontWeight:600}}>{cJobs.length} job{cJobs.length!==1?"s":""}</span>}
                  <span style={{fontSize:10,background:C.slateLight,color:C.slate,padding:"1px 7px",borderRadius:8}}>{c.stage||"Enquiry"}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Right — customer detail */}
      {!cust&&(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,flexDirection:"column",gap:12}}>
          <span style={{fontSize:48}}>🏢</span>
          <div style={{fontSize:16,fontWeight:600}}>Select a customer to view their details</div>
          <div style={{fontSize:13}}>Or add a new customer using the button on the left</div>
        </div>
      )}

      {cust&&(
        <div style={{flex:1,overflowY:"auto",padding:"0 0 0 24px"}}>
          {/* Customer header */}
          <div style={{background:C.navy,borderRadius:12,padding:"20px 24px",marginBottom:20,color:"#fff"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:11,opacity:.6,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Customer</div>
                <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>{cust.name}</div>
                <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:13,opacity:.85}}>
                  {cust.phone&&<span>📞 {cust.phone}</span>}
                  {cust.email&&<span>📧 {cust.email}</span>}
                </div>
                {cust.address&&<div style={{fontSize:13,opacity:.75,marginTop:4}}>📍 {cust.address}</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setEditModal(true)} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Edit</button>
                <button onClick={()=>deleteCustomer(cust.id)} style={{background:"rgba(220,38,38,0.3)",border:"1px solid rgba(220,38,38,0.5)",color:"#fff",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Delete</button>
              </div>
            </div>
            {/* Quick stats */}
            <div style={{display:"flex",gap:12,marginTop:16}}>
              {[["Jobs",custJobs.length,C.sky],["Active",custJobs.filter(j=>j.status!==COMPLETED_STAGE).length,"#F59E0B"],["Completed",custJobs.filter(j=>j.status===COMPLETED_STAGE).length,C.mint]].map(([label,val,color])=>(
                <div key={label} style={{background:"rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 16px",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:800,color}}>{val}</div>
                  <div style={{fontSize:11,opacity:.7}}>{label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Contact details card */}
          <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,padding:20,marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:700,color:C.navy,textTransform:"uppercase",letterSpacing:"0.05em"}}>
                {cust.type==="company"?"🏢 Company Details":"👤 Contact Details"}
              </div>
              <span style={{background:cust.type==="company"?"#EDE9FE":C.skyLight,color:cust.type==="company"?"#6D28D9":C.sky,fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:10}}>
                {cust.type==="company"?"Company":"Customer"}
              </span>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {(cust.type==="company"?[
                ["Company Name",cust.companyName||cust.name],
                ["Phone",cust.companyPhone||cust.phone||"—"],
                ["Email",cust.companyEmail||cust.email||"—"],
                ["Address",cust.companyAddress||cust.address||"—"],
                ["Website",cust.companyWebsite||"—"],
                ["VAT Number",cust.companyVat||"—"],
                ["Reg Number",cust.companyReg||"—"],
                ["Lead Source",cust.source||"—"],
              ]:[
                ["Name",cust.name],
                ["Phone",cust.phone||"—"],
                ["Email",cust.email||"—"],
                ["Address",cust.address||"—"],
                ["Lead Source",cust.source||"—"],
                ["Stage",cust.stage||"—"],
              ]).map(([label,val])=>(
                <div key={label} style={{padding:"8px 12px",background:C.slateLight,borderRadius:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>{label}</div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text}}>{val}</div>
                </div>
              ))}
            </div>

            {/* Company contacts */}
            {cust.type==="company"&&(cust.contacts||[]).length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:700,color:C.navy,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>👥 Contacts</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {(cust.contacts||[]).map((contact,i)=>(
                    <div key={i} style={{background:"#EDE9FE",borderRadius:8,padding:"10px 14px",display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
                      <div style={{minWidth:120}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#4C1D95"}}>{contact.name||"—"}</div>
                        {contact.role&&<div style={{fontSize:12,color:"#6D28D9"}}>{contact.role}</div>}
                      </div>
                      <div style={{display:"flex",gap:16,fontSize:12,color:"#4C1D95",flexWrap:"wrap"}}>
                        {contact.phone&&<span>📞 {contact.phone}</span>}
                        {contact.email&&<span>📧 {contact.email}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Notes */}
            {cust.notes&&(
              <div style={{background:"#FFFBEB",border:`1px solid ${C.amber}`,borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:13,color:"#78350F",fontStyle:"italic"}}>
                "{cust.notes}"
              </div>
            )}

            {/* Map */}
            {cust.address&&(
              <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
                <div style={{background:C.navy,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#fff"}}>📍 {cust.address}</span>
                  <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cust.address)}`} target="_blank" rel="noreferrer"
                    style={{fontSize:11,color:"rgba(255,255,255,0.7)",textDecoration:"none",background:"rgba(255,255,255,0.15)",padding:"3px 10px",borderRadius:8,fontWeight:600}}>Open in Maps ↗</a>
                </div>
                <iframe title="map" width="100%" height="200" style={{border:"none",display:"block"}} loading="lazy"
                  src={`https://maps.google.com/maps?q=${encodeURIComponent(cust.address)}&output=embed&z=15`}/>
              </div>
            )}
          </div>

          {/* Jobs section */}
          <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,padding:20,marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:C.navy,textTransform:"uppercase",letterSpacing:"0.05em"}}>Jobs ({custJobs.length})</div>
              <Btn style={{fontSize:12,padding:"5px 14px"}} onClick={()=>setAddJobModal(true)}>+ Add Job</Btn>
            </div>
            {custJobs.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:C.muted,fontSize:13}}>No jobs yet. Click + Add Job to create one.</div>}
            {custJobs.map(job=>{
              const isCompleted=job.status===COMPLETED_STAGE;
              return (
                <div key={job.id} onClick={()=>setSelectedJob(job)}
                  style={{border:`1px solid ${isCompleted?"#86EFAC":C.border}`,borderRadius:10,padding:14,marginBottom:10,cursor:"pointer",
                    background:isCompleted?"#F0FDF4":C.white,transition:"box-shadow 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}
                >
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div style={{fontWeight:700,fontSize:15,color:C.navy}}>{job.title}</div>
                    <Badge label={job.status}/>
                  </div>
                  {job.products?.length>0&&<div style={{fontSize:12,color:C.slate,marginBottom:4}}>{job.products.join(", ")}</div>}
                  <div style={{display:"flex",gap:16,fontSize:12,color:C.muted,flexWrap:"wrap"}}>
                    {job.value&&<span style={{color:C.mint,fontWeight:700}}>£{Number(job.value).toLocaleString()}</span>}
                    {job.windowcad&&<span>🪟 {job.windowcad}</span>}
                    {job.tabs?.installation?.date&&<span>🔨 {new Date(job.tabs.installation.date).toLocaleDateString("en-GB")}</span>}
                    {isCompleted&&job.completedAt&&<span style={{color:"#15803D",fontWeight:600}}>✅ {job.completedAt}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Modals */}
      {showAddModal&&<Modal title="Add New Customer" onClose={()=>setShowAddModal(false)}>
        <CustomerDirectoryForm onSave={saveCustomer} onCancel={()=>setShowAddModal(false)}/>
      </Modal>}

      {editModal&&cust&&<Modal title="Edit Customer" onClose={()=>setEditModal(false)}>
        <CustomerDirectoryForm initial={cust} onSave={saveCustomer} onCancel={()=>setEditModal(false)}/>
      </Modal>}

      {addJobModal&&cust&&<Modal title="Add Job" onClose={()=>setAddJobModal(false)}>
        <JobForm customers={customers} initial={{customerId:cust.id,status:"Book Survey"}} onSave={saveJob} onCancel={()=>setAddJobModal(false)}/>
      </Modal>}

      {selectedJob&&<CardDetailModal
        record={jobs.find(j=>j.id===selectedJob.id)||selectedJob}
        customers={customers} isJob={true} settings={settings}
        onSave={updated=>setJobs(js=>js.map(j=>j.id===updated.id?updated:j))}
        onDelete={id=>{setJobs(js=>js.filter(j=>j.id!==id));setSelectedJob(null);}}
        onClose={()=>setSelectedJob(null)}
      />}
    </div>
  );
};

// ── Customer Directory Form ───────────────────────────────────────────────────
const CustomerDirectoryForm = ({initial={},onSave,onCancel}) => {
  const [type,setType]=useState(initial.type||"customer");
  const [form,setForm]=useState({
    name:"",email:"",phone:"",address:"",source:"Website",notes:"",
    // Company extras
    companyName:"",companyPhone:"",companyEmail:"",companyAddress:"",
    companyWebsite:"",companyVat:"",companyReg:"",
    contacts:[{name:"",role:"",phone:"",email:""}],
    ...initial,
    type:initial.type||"customer",
  });
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const addContact=()=>setForm(f=>({...f,contacts:[...f.contacts,{name:"",role:"",phone:"",email:""}]}));
  const updateContact=(i,field,val)=>setForm(f=>({...f,contacts:f.contacts.map((c,ci)=>ci===i?{...c,[field]:val}:c)}));
  const removeContact=(i)=>setForm(f=>({...f,contacts:f.contacts.filter((_,ci)=>ci!==i)}));

  const isValid=type==="customer"?!!form.name:!!form.companyName;

  const handleSave=()=>{
    if(!isValid) return;
    onSave({...form,type,
      // For display — use company name as the primary name if company type
      name:type==="company"?form.companyName:form.name,
      phone:type==="company"?form.companyPhone:form.phone,
      email:type==="company"?form.companyEmail:form.email,
      address:type==="company"?form.companyAddress:form.address,
    });
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* Type selector */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,background:C.slateLight,borderRadius:10,padding:4}}>
        {[["customer","👤 Customer"],["company","🏢 Company"]].map(([val,label])=>(
          <button key={val} onClick={()=>setType(val)} style={{
            padding:"10px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,fontWeight:700,
            background:type===val?C.navy:"transparent",
            color:type===val?"#fff":C.slate,
            transition:"all 0.15s",
          }}>{label}</button>
        ))}
      </div>

      {/* ── CUSTOMER FORM ── */}
      {type==="customer"&&(
        <>
          <Inp label="Full Name *" value={form.name} onChange={set("name")} placeholder="e.g. John Smith"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Inp label="Phone" value={form.phone||""} onChange={set("phone")} placeholder="07700 000000"/>
            <Inp label="Email" type="email" value={form.email||""} onChange={set("email")} placeholder="john@email.com"/>
          </div>
          <Inp label="Address" value={form.address||""} onChange={set("address")} placeholder="14 Oak Lane, Camberley, GU15 2AB"/>
          <Sel label="Lead Source" value={form.source||"Website"} onChange={set("source")}>
            {SOURCES.map(s=><option key={s}>{s}</option>)}
          </Sel>
          <TA label="Notes" value={form.notes||""} onChange={set("notes")} placeholder="Any additional notes..."/>
        </>
      )}

      {/* ── COMPANY FORM ── */}
      {type==="company"&&(
        <>
          {/* Company details */}
          <div style={{background:C.slateLight,borderRadius:8,padding:14}}>
            <div style={{fontSize:12,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:12}}>🏢 Company Details</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Inp label="Company Name *" value={form.companyName||""} onChange={set("companyName")} placeholder="e.g. Smith Builders Ltd"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Inp label="Company Phone" value={form.companyPhone||""} onChange={set("companyPhone")} placeholder="01252 000000"/>
                <Inp label="Company Email" type="email" value={form.companyEmail||""} onChange={set("companyEmail")} placeholder="info@smithbuilders.co.uk"/>
              </div>
              <Inp label="Company Address" value={form.companyAddress||""} onChange={set("companyAddress")} placeholder="Unit 4, Business Park, Farnborough, GU14 0AA"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Inp label="Website" value={form.companyWebsite||""} onChange={set("companyWebsite")} placeholder="www.smithbuilders.co.uk"/>
                <Inp label="VAT Number" value={form.companyVat||""} onChange={set("companyVat")} placeholder="GB 123 4567 89"/>
              </div>
              <Inp label="Company Reg Number" value={form.companyReg||""} onChange={set("companyReg")} placeholder="12345678"/>
              <Sel label="Lead Source" value={form.source||"Referral"} onChange={set("source")}>
                {SOURCES.map(s=><option key={s}>{s}</option>)}
              </Sel>
              <TA label="Notes" value={form.notes||""} onChange={set("notes")} placeholder="e.g. Builder working on multiple residential sites in Surrey..."/>
            </div>
          </div>

          {/* Contacts */}
          <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
            <div style={{background:C.navy,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{color:"#fff",fontWeight:700,fontSize:14}}>👥 Contacts at this Company</div>
              <button onClick={addContact} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Add Contact</button>
            </div>
            {(form.contacts||[]).map((contact,i)=>(
              <div key={i} style={{padding:14,borderBottom:`1px solid ${C.border}`,background:i%2===0?C.white:C.slateLight}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.navy}}>Contact {i+1}</div>
                  {(form.contacts||[]).length>1&&(
                    <button onClick={()=>removeContact(i)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:13,fontWeight:600}}>Remove</button>
                  )}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Full Name</label>
                    <input value={contact.name||""} onChange={e=>updateContact(i,"name",e.target.value)} placeholder="e.g. Dave Smith"
                      style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Role / Job Title</label>
                    <input value={contact.role||""} onChange={e=>updateContact(i,"role",e.target.value)} placeholder="e.g. Site Manager"
                      style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Phone</label>
                    <input value={contact.phone||""} onChange={e=>updateContact(i,"phone",e.target.value)} placeholder="07700 000000"
                      style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Email</label>
                    <input value={contact.email||""} onChange={e=>updateContact(i,"email",e.target.value)} placeholder="dave@smithbuilders.co.uk" type="email"
                      style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,boxSizing:"border-box"}}/>
                  </div>
                </div>
              </div>
            ))}
            {(form.contacts||[]).length===0&&(
              <div style={{padding:"16px",textAlign:"center",color:C.muted,fontSize:13}}>No contacts added yet.</div>
            )}
          </div>
        </>
      )}

      <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:8,borderTop:`1px solid ${C.border}`}}>
        <Btn variant="secondary" onClick={onCancel}>Cancel</Btn>
        <Btn onClick={handleSave} style={{opacity:isValid?1:0.5}}>{type==="company"?"Save Company":"Save Customer"}</Btn>
      </div>
    </div>
  );
};

// ── App Shell ─────────────────────────────────────────────────────────────────
function App() {
  const [customers,setCustomers]=useState(seedCustomers);
  const [jobs,setJobs]=useState(seedJobs);
  const [page,setPage]=useState("dashboard");
  const [userRole,setUserRole]=useState(null);
  const [selectedFitter,setSelectedFitter]=useState(null);
  const [pwInput,setPwInput]=useState("");
  const [pwError,setPwError]=useState(false);
  const [showPw,setShowPw]=useState(false);
  const [gs,setGs]=useState("");
  const [gsOpen,setGsOpen]=useState(false);
  const [settings,setSettings]=useState({
    fitters:[...DEFAULT_FITTERS],
    staff:[...DEFAULT_STAFF],
    suppliers:[...DEFAULT_SUPPLIERS],
    companyName:"VisualPro",
    companyPhone:"",
    companyEmail:"",
    companyWebsite:"",
    emailTemplates:{...DEFAULT_EMAIL_TEMPLATES},
    feedbackQuestions:[...DEFAULT_FEEDBACK_QUESTIONS],
    fitterPasswords:{"Tom Bailey":"glazing1","Steve Marsh":"glazing2","Dan Rees":"glazing3","Chris Wood":"glazing4"},
  });

  const handleFitterLogin=()=>{
    const storedPw=settings.fitterPasswords?.[selectedFitter]||"";
    if(!storedPw||pwInput===storedPw){setUserRole(selectedFitter);}
    else{setPwError(true);setTimeout(()=>setPwError(false),2000);}
  };

  const resetLogin=()=>{setSelectedFitter(null);setPwInput("");setPwError(false);setShowPw(false);};

  // ── Login: password screen ──
  if(!userRole&&selectedFitter){
    const hasPw=!!(settings.fitterPasswords?.[selectedFitter]);
    return (
      <div style={{minHeight:"100vh",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter','Segoe UI',sans-serif",padding:20}}>
        <div style={{background:C.white,borderRadius:16,width:"100%",maxWidth:360,overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>
          <div style={{background:C.navy,padding:"28px 24px",textAlign:"center",borderBottom:`3px solid ${C.sky}`}}>
            <div style={{width:60,height:60,borderRadius:"50%",background:C.mint,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 12px"}}>👷</div>
            <div style={{color:"#fff",fontWeight:800,fontSize:20}}>{selectedFitter}</div>
            <div style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginTop:4}}>Fitter Portal</div>
          </div>
          <div style={{padding:24}}>
            {hasPw?(
              <>
                <label style={{fontSize:12,fontWeight:700,color:C.slate,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:8}}>🔒 Enter Your Password</label>
                <div style={{position:"relative",marginBottom:16}}>
                  <input type={showPw?"text":"password"} value={pwInput}
                    onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
                    onKeyDown={e=>e.key==="Enter"&&handleFitterLogin()}
                    placeholder="Enter your password" autoFocus
                    style={{width:"100%",border:`2px solid ${pwError?C.red:C.border}`,borderRadius:8,padding:"12px 44px 12px 14px",fontSize:16,outline:"none",boxSizing:"border-box",color:C.text,background:pwError?"#FEF2F2":C.white}}/>
                  <button onClick={()=>setShowPw(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:18,padding:0}}>{showPw?"🙈":"👁️"}</button>
                </div>
                {pwError&&<div style={{background:"#FEF2F2",border:`1px solid ${C.red}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.red,fontWeight:600,marginBottom:16,textAlign:"center"}}>❌ Incorrect password. Please try again.</div>}
                <button onClick={handleFitterLogin} style={{width:"100%",background:C.sky,color:"#fff",border:"none",borderRadius:10,padding:"14px",fontSize:16,fontWeight:700,cursor:"pointer",marginBottom:10}}>Log In →</button>
              </>
            ):(
              <>
                <div style={{background:"#FFFBEB",border:`1px solid ${C.amber}`,borderRadius:8,padding:"12px 14px",fontSize:13,color:"#92400E",marginBottom:16}}>⚠️ No password set. Contact your admin to set one up in Settings.</div>
                <button onClick={()=>setUserRole(selectedFitter)} style={{width:"100%",background:C.mint,color:"#fff",border:"none",borderRadius:10,padding:"14px",fontSize:16,fontWeight:700,cursor:"pointer",marginBottom:10}}>Continue Without Password →</button>
              </>
            )}
            <button onClick={resetLogin} style={{width:"100%",background:"none",border:"none",color:C.slate,fontSize:14,cursor:"pointer",padding:"8px"}}>← Back to login</button>
          </div>
        </div>
      </div>
    );
  }

  // ── Login: user selection ──
  if(!userRole){
    return (
      <div style={{minHeight:"100vh",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter','Segoe UI',sans-serif",padding:20}}>
        <div style={{background:C.white,borderRadius:16,width:"100%",maxWidth:400,overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>
          <div style={{background:C.navy,padding:"28px 24px",textAlign:"center",borderBottom:`3px solid ${C.sky}`}}>
            <div style={{fontSize:40,marginBottom:8}}>🪟</div>
            <div style={{color:"#fff",fontWeight:800,fontSize:22}}>{settings.companyName||"VisualPro"}</div>
            <div style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginTop:4}}>Select your name to continue</div>
          </div>
          <div style={{padding:20,display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={()=>setUserRole("office")}
              style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:10,border:`1px solid ${C.border}`,background:C.white,cursor:"pointer",textAlign:"left"}}
              onMouseEnter={e=>e.currentTarget.style.background=C.slateLight}
              onMouseLeave={e=>e.currentTarget.style.background=C.white}>
              <div style={{width:40,height:40,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🏢</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,color:C.navy}}>Office Admin</div>
                <div style={{fontSize:12,color:C.slate,marginTop:1}}>Full CRM access</div>
              </div>
              <div style={{color:C.muted,fontSize:20}}>›</div>
            </button>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0"}}>
              <div style={{flex:1,height:1,background:C.border}}/>
              <span style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>Fitters</span>
              <div style={{flex:1,height:1,background:C.border}}/>
            </div>
            {settings.fitters.map(f=>{
              const hasPw=!!(settings.fitterPasswords?.[f]);
              return (
                <button key={f} onClick={()=>{setSelectedFitter(f);setPwInput("");setPwError(false);}}
                  style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:10,border:`1px solid ${C.border}`,background:C.white,cursor:"pointer",textAlign:"left"}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.slateLight}
                  onMouseLeave={e=>e.currentTarget.style.background=C.white}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:C.mint,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>👷</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15,color:C.navy}}>{f}</div>
                    <div style={{fontSize:12,color:C.slate,marginTop:1}}>Fitter portal · {hasPw?"🔒 Password protected":"⚠️ No password set"}</div>
                  </div>
                  <div style={{color:C.muted,fontSize:20}}>›</div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── Fitter view ──
  if(userRole!=="office"){
    return <FitterApp fitterName={userRole} jobs={jobs} customers={customers} setJobs={setJobs} settings={settings} onLogout={()=>{setUserRole(null);resetLogin();}}/>;
  }

  // ── Office CRM ──
  const navItems=[
    {id:"dashboard",label:"Dashboard",icon:"▦"},
    {id:"pipeline",label:"Sales Pipeline",icon:"👤"},
    {id:"jobs",label:"Installation Pipeline",icon:"🔨"},
    {id:"calendar",label:"Fitter Calendar",icon:"📅"},
    {id:"orders",label:"Track Orders",icon:"📦"},
    {id:"customers",label:"Customers",icon:"🏢"},
    {id:"settings",label:"Settings",icon:"⚙️"},
  ];
  const isKanban=page==="pipeline"||page==="jobs";

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'Inter','Segoe UI',sans-serif",background:C.slateLight,color:C.text}}>
      <div style={{width:220,background:C.navy,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"24px 20px 20px",borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,background:C.sky,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🪟</div>
            <div>
              <div style={{color:"#fff",fontWeight:800,fontSize:15,lineHeight:1.2}}>{settings.companyName||"VisualPro"}</div>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>CRM</div>
            </div>
          </div>
        </div>
        <nav style={{padding:"16px 10px",flex:1}}>
          {navItems.map(({id,label,icon})=>(
            <button key={id} onClick={()=>setPage(id)} style={{width:"100%",textAlign:"left",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,border:"none",cursor:"pointer",marginBottom:2,background:page===id?"rgba(74,144,217,0.25)":"transparent",color:page===id?"#fff":"rgba(255,255,255,0.6)",fontWeight:page===id?700:400,fontSize:14}}>
              <span>{icon}</span>{label}
            </button>
          ))}
        </nav>
        <div onClick={()=>{setUserRole(null);resetLogin();}} style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.1)",cursor:"pointer"}}>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>🏢 Office Admin · <span style={{textDecoration:"underline"}}>Switch user</span></div>
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"14px 28px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:16,color:C.navy}}>{navItems.find(n=>n.id===page)?.label}</div>
          {/* Global search */}
          {(()=>{
            const gsResults=(()=>{
              const q=gs.toLowerCase().trim();
              if(!q||q.length<2) return [];
              const custs=customers.filter(c=>
                c.name.toLowerCase().includes(q)||
                c.phone.includes(q)||
                (c.address||"").toLowerCase().includes(q)||
                (c.email||"").toLowerCase().includes(q)
              ).slice(0,5).map(c=>({type:"Customer",label:c.name,sub:c.phone?(c.phone+" · "+c.address):c.address,nav:"customers",customerId:c.id}));
              const js2=jobs.filter(j=>{
                const cust=customers.find(c=>c.id===j.customerId);
                return j.title.toLowerCase().includes(q)||
                  (cust?.name||"").toLowerCase().includes(q)||
                  (j.windowcad||"").toLowerCase().includes(q)||
                  (cust?.address||"").toLowerCase().includes(q)||
                  (cust?.phone||"").includes(q);
              }).slice(0,6).map(j=>({
                type:j.status===COMPLETED_STAGE?"Completed Job":"Job",
                label:j.title,
                sub:customers.find(c=>c.id===j.customerId)?.name||"",
                nav:"customers",
                customerId:j.customerId,
                jobId:j.id,
                status:j.status,
              }));
              return [...custs,...js2];
            })();
            return (
              <div style={{flex:1,maxWidth:400,position:"relative",margin:"0 20px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,background:C.slateLight,borderRadius:8,padding:"6px 12px",border:`1px solid ${gsOpen?C.sky:C.border}`}}>
                  <span style={{color:C.muted,fontSize:14}}>🔍</span>
                  <input value={gs} onChange={e=>{setGs(e.target.value);setGsOpen(true);}} onFocus={()=>setGsOpen(true)} onBlur={()=>setTimeout(()=>setGsOpen(false),150)}
                    placeholder="Search customers, jobs, WindowCAD refs…"
                    style={{border:"none",background:"transparent",outline:"none",fontSize:13,color:C.text,flex:1}}/>
                  {gs&&<button onClick={()=>{setGs("");setGsOpen(false);}} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:16,lineHeight:1,padding:0}}>×</button>}
                </div>
                {gsOpen&&gsResults.length>0&&(
                  <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.white,borderRadius:8,border:`1px solid ${C.border}`,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:99,marginTop:4,overflow:"hidden"}}>
                    {gsResults.map((r,i)=>(
                      <div key={i} onMouseDown={()=>{
                        setPage("customers");
                        setGs("");setGsOpen(false);
                        // Store which customer/job to highlight — CustomerDirectoryPage reads this
                        if(r.customerId) setTimeout(()=>window._gsCustId=r.customerId,50);
                        if(r.jobId) setTimeout(()=>window._gsJobId=r.jobId,50);
                      }}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,background:C.white}}
                        onMouseEnter={e=>e.currentTarget.style.background=C.slateLight}
                        onMouseLeave={e=>e.currentTarget.style.background=C.white}>
                        <span style={{
                          background:r.type==="Customer"?"#EFF6FF":r.type==="Completed Job"?"#F0FDF4":C.skyLight,
                          color:r.type==="Customer"?C.sky:r.type==="Completed Job"?"#15803D":C.navy,
                          fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,flexShrink:0
                        }}>{r.type==="Customer"?"🏢 Customer":r.type==="Completed Job"?"✅ Completed":"🔨 Job"}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.label}</div>
                          <div style={{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.sub}</div>
                        </div>
                        <span style={{fontSize:11,color:C.muted,flexShrink:0}}>View →</span>
                      </div>
                    ))}
                  </div>
                )}
                {gsOpen&&gs.length>=2&&gsResults.length===0&&(
                  <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.white,borderRadius:8,border:`1px solid ${C.border}`,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:99,marginTop:4,padding:"14px 16px",fontSize:13,color:C.muted,textAlign:"center"}}>
                    No results found for "{gs}"
                  </div>
                )}
              </div>
            );
          })()}
          <div style={{fontSize:13,color:C.slate,flexShrink:0}}>{customers.length} customers · {jobs.length} jobs</div>
        </div>
        <div style={{flex:1,overflow:isKanban?"hidden":"auto",padding:24,display:"flex",flexDirection:"column"}}>
          {page==="dashboard"&&<Dashboard customers={customers} jobs={jobs}/>}
          {page==="pipeline"&&<SalesPipelinePage customers={customers} setCustomers={setCustomers} jobs={jobs} setJobs={setJobs} settings={settings}/>}
          {page==="jobs"&&<InstallPipelinePage jobs={jobs} setJobs={setJobs} customers={customers} settings={settings}/>}
          {page==="calendar"&&<CalendarPage customers={customers} jobs={jobs} settings={settings}/>}
          {page==="orders"&&<TrackOrdersPage jobs={jobs} customers={customers}/>}
          {page==="customers"&&<CustomerDirectoryPage customers={customers} setCustomers={setCustomers} jobs={jobs} setJobs={setJobs} settings={settings} onNavigate={setPage}/>}
          {page==="settings"&&<SettingsPage settings={settings} setSettings={setSettings} onNewEnquiry={lead=>setCustomers(cs=>[lead,...cs])}/>}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
document.getElementById('loading').style.display = 'none';
document.body.style.background = '#F1F5F9';
  </script>
</body>
</html>
