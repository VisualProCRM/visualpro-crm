name: Deploy VisualPro CRM Backend Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: visualpro-crm_group
  SQL_SERVER_NAME: visualpro-crm-sqlsvr

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy infra (Bicep)
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC, no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: az bicep build --file infra/main.bicep

      - name: Deploy Bicep to visualpro-crm_group
        id: deploy
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --name "visualpro-crm-infra-${{ github.run_number }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters \
              sqlAadAdminLogin="${{ vars.SQL_AAD_ADMIN_LOGIN }}" \
              sqlAadAdminObjectId="${{ vars.SQL_AAD_ADMIN_OBJECT_ID }}" \
              sqlAadAdminType="${{ vars.SQL_AAD_ADMIN_TYPE }}" \
              deployPrincipalObjectId="${{ vars.AZURE_DEPLOY_PRINCIPAL_OBJECT_ID }}" \
            --query properties.outputs -o json > outputs.json
          echo "functionAppName=$(jq -r .functionAppName.value outputs.json)" >> "$GITHUB_OUTPUT"
          echo "sqlServerFqdn=$(jq -r .sqlServerFqdn.value outputs.json)" >> "$GITHUB_OUTPUT"
          echo "sqlDatabaseName=$(jq -r .sqlDatabaseName.value outputs.json)" >> "$GITHUB_OUTPUT"

      # The SQL server's "Allow Azure services" firewall rule only covers first-party Azure
      # PaaS traffic, not GitHub-hosted runners — so we open a scoped, temporary rule for
      # this run's runner IP, use it, then remove it (always(), so it's cleaned up even if
      # the sqlcmd step below fails).
      - name: Open temporary SQL firewall rule for this runner
        id: fw
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runnerIp=$RUNNER_IP" >> "$GITHUB_OUTPUT"
          az sql server firewall-rule create \
            --resource-group "$RESOURCE_GROUP" \
            --server "$SQL_SERVER_NAME" \
            --name "gh-runner-${{ github.run_id }}" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      # Idempotent: safe to re-run on every deploy. Grants the Function App's managed
      # identity read/write access to the database — see infra/scripts/grant-sql-access.sql.
      # This step relies on the azure/login OIDC session for AAD auth against SQL. If it
      # fails in your run, the fallback is to run infra/scripts/grant-sql-access.sql
      # manually once via the Azure Portal's SQL Query Editor ("Continue as <your account>"),
      # substituting $(FunctionAppName) with the actual Function App name.
      - name: Grant Function App managed identity access to SQL database
        uses: azure/sql-action@v2
        with:
          connection-string: "Server=tcp:${{ steps.deploy.outputs.sqlServerFqdn }},1433;Database=${{ steps.deploy.outputs.sqlDatabaseName }};Authentication=Active Directory Default;"
          path: "./infra/scripts/grant-sql-access.sql"
          arguments: '-v FunctionAppName="${{ steps.deploy.outputs.functionAppName }}"'

      - name: Remove temporary SQL firewall rule
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --server "$SQL_SERVER_NAME" \
            --name "gh-runner-${{ github.run_id }}" \
            --yes || true
